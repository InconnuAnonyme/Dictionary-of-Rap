<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dictionary of Rap</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg1:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
  --txt:#f2f2f2;--txt2:#888;--txt3:#444;
  --acc:#a78bfa;--glow:rgba(167,139,250,.22);
  --grn:#34d399;--amb:#fbbf24;--red:#f87171;
  --r1:6px;--r2:10px;--r3:16px;
}
body.light{
  --bg:#f9f9fb;--bg1:#fff;--bg2:#f2f2f5;--bg3:#e8e8ed;
  --line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.13);
  --txt:#0f0f0f;--txt2:#666;--txt3:#bbb;
  --acc:#6d28d9;--glow:rgba(109,40,217,.15);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--acc)}
#bg-noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.admin-bar{display:none;align-items:center;gap:16px;padding:8px 20px;background:linear-gradient(90deg,rgba(124,58,237,.15),rgba(167,139,250,.08));border-bottom:1px solid rgba(167,139,250,.2);font-size:12px;color:var(--acc);position:sticky;top:0;z-index:201}
.admin-bar span{flex:1;font-weight:500}
.admin-bar button{padding:4px 12px;border-radius:20px;border:1px solid rgba(167,139,250,.3);background:transparent;color:var(--acc);font-size:11px;font-weight:600;cursor:pointer;transition:background .15s}
.admin-bar button:hover{background:rgba(167,139,250,.15)}
.hdr{position:sticky;top:0;z-index:200;background:rgba(8,8,8,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:0 20px;height:54px;display:flex;align-items:center}
body.light .hdr{background:rgba(249,249,251,.9)}
.hdr-row{display:flex;align-items:center;width:100%;gap:10px}
#site-title{font-size:15px;font-weight:800;letter-spacing:-.3px;color:var(--txt);white-space:nowrap;flex-shrink:0}
#site-title span{color:var(--acc)}
.hdr-spacer{flex:1}
.hdr-btns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.hbtn{width:34px;height:34px;border-radius:var(--r1);border:1px solid var(--line2);background:var(--bg2);color:var(--txt2);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .18s;text-decoration:none;white-space:nowrap;flex-shrink:0}
.hbtn:hover{border-color:var(--acc);color:var(--acc);background:var(--bg3)}
.hbtn:active{transform:scale(.93)}
.map-link{display:inline-flex;align-items:center;gap:6px;padding:0 12px;height:32px;border-radius:var(--r1);border:1px solid var(--line);background:transparent;color:var(--txt2);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0}
.map-link:hover{border-color:var(--acc);color:var(--acc);background:rgba(167,139,250,.06)}
.tabs{position:sticky;top:54px;z-index:199;background:rgba(8,8,8,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
body.light .tabs{background:rgba(249,249,251,.92)}
.tab{padding:0 16px;height:44px;display:flex;align-items:center;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--txt3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .18s,border-color .18s}
.tab:hover{color:var(--txt2)}
.tab.on{color:var(--txt);border-bottom-color:var(--acc)}
.ctrl{padding:10px 20px;background:var(--bg1);border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:98px;z-index:198}
.srch{flex:1;min-width:160px;position:relative}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.srch input{width:100%;height:34px;padding:0 12px 0 32px;border:1px solid var(--line2);border-radius:var(--r1);background:var(--bg2);color:var(--txt);font-size:13px;outline:none;transition:border-color .18s,box-shadow .18s}
.srch input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow)}
.srch input::placeholder{color:var(--txt3)}
.ctrl select{height:34px;padding:0 28px 0 12px;border:1px solid var(--line2);border-radius:var(--r1);background:var(--bg2);color:var(--txt2);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23888'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.ctrl select:hover{color:var(--txt)}
.vtog{display:flex;border:1px solid var(--line2);border-radius:var(--r1);overflow:hidden;flex-shrink:0}
.vb{width:34px;height:34px;background:var(--bg2);border:none;cursor:pointer;color:var(--txt3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.vb:hover:not(.on){background:var(--bg3);color:var(--txt2)}
.vb.on{background:var(--acc);color:#fff}
.fwrap{position:relative}
.fibtn{height:34px;padding:0 12px;border:1px solid var(--line2);border-radius:var(--r1);background:var(--bg2);color:var(--txt2);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .18s;white-space:nowrap}
.fibtn:hover,.fibtn.hf{border-color:var(--acc);color:var(--acc);background:rgba(167,139,250,.06)}
.fdot{width:6px;height:6px;border-radius:50%;background:var(--acc);display:none}
.fibtn.hf .fdot{display:inline-block}
.fpan{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r2);padding:14px;z-index:500;min-width:300px;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.fpan.open{display:block}
.fsec{margin-bottom:14px}.fsec:last-child{margin-bottom:0}
.fst{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.fchips{display:flex;flex-wrap:wrap;gap:6px}
.fchip{padding:4px 12px;border-radius:20px;border:1px solid var(--line2);font-size:11px;font-weight:600;background:transparent;color:var(--txt2);cursor:pointer;transition:all .15s}
.fchip:hover:not(.on){border-color:var(--acc);color:var(--acc)}
.fchip.on{background:var(--acc);color:#fff;border-color:transparent}
.fclear{width:100%;padding:6px;border:none;border-radius:var(--r1);background:transparent;color:var(--acc);font-size:11px;font-weight:600;cursor:pointer;text-align:left;margin-top:6px}
.fclose{width:100%;height:32px;margin-top:10px;border:1px solid var(--line2);border-radius:var(--r1);background:transparent;color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer}
.tp{display:none}.tp.on{display:block}
.lw{padding:12px 20px;max-width:960px;margin:0 auto}
.alist{display:flex;flex-direction:column;gap:6px}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.agrid .cw.xpw{grid-column:1/-1}
.cw{display:flex;flex-direction:column}
.ac{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r2);padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s,border-color .2s,transform .15s;user-select:none;position:relative;overflow:hidden}
.ac::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--acc);opacity:0;transition:opacity .2s}
.ac:hover{background:var(--bg2);border-color:var(--line2);transform:translateX(2px)}
.ac:hover::before,.ac.xp::before{opacity:1}
.ac.xp{border-radius:var(--r2) var(--r2) 0 0;border-color:rgba(167,139,250,.3);background:var(--bg2)}
.rnk{font-size:11px;color:var(--txt3);min-width:20px;text-align:right;font-weight:500}
.cvsm{width:44px;height:44px;border-radius:var(--r1);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.cvsm img{width:100%;height:100%;object-fit:cover;border-radius:var(--r1)}
.ai{flex:1;min-width:0}
.at{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aa{font-size:11px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.aa a:hover{color:var(--acc)}
.ay{font-size:10px;color:var(--txt3);margin-top:1px}
.afb{font-size:10px;font-weight:700;color:#fb7185;margin-top:3px;letter-spacing:.3px;text-transform:uppercase}
.asw{text-align:right;flex-shrink:0}
.asc{font-size:20px;font-weight:800;line-height:1}
.sb{width:48px;height:2px;background:var(--bg3);border-radius:2px;margin-top:4px;overflow:hidden}
.sbf{height:100%;border-radius:2px}
.xi{color:var(--txt3);font-size:10px;transition:transform .2s;flex-shrink:0}
.ac.xp .xi{transform:rotate(180deg)}
.hb{background:none;border:none;cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;line-height:1;transition:transform .2s,filter .15s;opacity:.4}

.hb.active{opacity:1}
.tpan{background:var(--bg2);border:1px solid rgba(167,139,250,.2);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;transition:background .5s}
.tpi{padding:14px}
.tph{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.cvlg{width:80px;height:80px;border-radius:var(--r2);object-fit:cover;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.cvlgp{width:80px;height:80px;border-radius:var(--r2);background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;border:1px dashed var(--line2);transition:border-color .15s}

.tm{flex:1}
.tmt{font-size:15px;font-weight:700}

.tmy{font-size:11px;color:var(--txt3);margin-top:2px}

.srow{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap}
.sbox{background:var(--bg3);border:1px solid var(--line);border-radius:var(--r2);padding:10px 14px;flex:1;min-width:130px}

.sbv{font-size:26px;font-weight:800;line-height:1}
.sbs{font-size:10px;color:var(--txt3);margin-top:4px}
.str{display:flex;gap:4px;margin-top:8px}
.st{font-size:20px;cursor:pointer;line-height:1;color:var(--txt3);transition:transform .15s,color .1s}
.st.lit{color:var(--amb)}
.st:hover{transform:scale(1.2)}
.crwrap{margin:10px 0}
.crlbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);margin-bottom:8px}
.crtext{font-size:13px;line-height:1.7;color:var(--txt2);white-space:pre-wrap;font-style:italic;padding:10px 14px;background:var(--bg1);border-radius:var(--r1);border-left:2px solid var(--acc)}
.crta{width:100%;padding:10px 14px;border:1px solid var(--line2);border-radius:var(--r1);background:var(--bg1);color:var(--txt);font-size:13px;line-height:1.7;resize:vertical;min-height:90px;outline:none;font-style:italic;font-family:inherit;transition:border-color .18s}
.crta:focus{border-color:var(--acc)}
.tlist{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}
.tr{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--line)}
.tr:last-child{border-bottom:none}
.tn{font-size:11px;color:var(--txt3);min-width:18px;text-align:right}
.tt{flex:1;font-size:12px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tf{font-size:11px;color:var(--txt3);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbr{width:44px;height:2px;background:var(--bg3);border-radius:2px;overflow:hidden;flex-shrink:0}
.tbf{height:100%;border-radius:2px}
.tg{font-size:12px;font-weight:700;min-width:34px;text-align:right}
.pact{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.gc{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r2);cursor:pointer;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .2s}

.gb{padding:10px 12px}
.gs{font-size:20px;font-weight:800}
.gti{font-size:12px;font-weight:600;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gar{font-size:11px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.se{color:var(--grn)}.sg{color:var(--acc)}.so{color:var(--amb)}.sl{color:var(--red)}.sn{color:var(--txt3)}
.be{background:var(--grn)}.bg2{background:var(--acc)}.bo{background:var(--amb)}.bl{background:var(--red)}

.cvpw{display:flex;gap:10px;align-items:center}

<body>
<div id="bg-noise"></div>
<div id="admin-bar" class="admin-bar"></div>
<header class="hdr">
  <div class="hdr-row">
    <h1 id="site-title">The Dictionary<span> of Rap</span></h1>
    <div class="hdr-spacer"></div>
    <div class="hdr-btns">
      <a href="rap_map.html" class="map-link">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>

      <button class="hbtn" onclick="document.getElementById('login-modal').classList.add('open')" title="Admin">&#128272;</button>
      <button class="hbtn" onclick="exportData()" title="Export">&#11015;</button>
      <label class="hbtn" title="Import" style="cursor:pointer">&#11014;<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    </div>
  </div>
</header>
<nav class="tabs">

  <div class="tab" onclick="switchTab('decades')">D&eacute;cennies</div>

<div class="tp on" id="tab-albums">

<div class="tp" id="tab-stats"><div class="swrap" id="stats-content"></div></div>
<div class="tp" id="tab-hof"><div class="hof-wrap" id="hof-content"></div></div>

</div>

const safeLS = (()=>{

function renderAdminBar(){
  const bar=document.getElementById('admin-bar');
  bar.style.display=isAdmin?'flex':'none';
  if(isAdmin) bar.innerHTML='<span>🔐 Mode admin activé</span><button onclick="logout()">Se déconnecter</button>';

const BASE_DATA = INITIAL_DATA.map(a=>({...a,cover:a.cover||null,year:a.year||null,fav:a.fav||false,critique:a.critique||'',hof:a.hof||false,tracks:(a.tracks||[]).map(t=>({title:t.title,grade:t.grade??null,feat:t.feat||null}))}));
function loadAlbums(){
  const ch=JSON.parse(safeLS.getItem('hiphop_changes')||'{"edits":{},"additions":[],"deletions":[]}');
  let list=BASE_DATA.filter(a=>!ch.deletions.includes(a.id)).map(a=>ch.edits[a.id]?{...a,...ch.edits[a.id]}:a);
  return list.concat(ch.additions||[]);
}
let albums=loadAlbums();
let visitorRatings=JSON.parse(safeLS.getItem('hiphop_vr')||'{}');
function save(){
  const bm=Object.fromEntries(BASE_DATA.map(a=>[a.id,a]));
  const additions=albums.filter(a=>!bm[a.id]);
  const deletions=BASE_DATA.filter(b=>!albums.find(a=>a.id===b.id)).map(b=>b.id);
  const edits={};
  albums.forEach(a=>{
    const base=bm[a.id]; if(!base) return;
    const diff={};
    ['artist','album','year','cover','tracks','avg','fav','critique','hof'].forEach(k=>{if(JSON.stringify(a[k])!==JSON.stringify(base[k]))diff[k]=a[k];});
    if(Object.keys(diff).length) edits[a.id]=diff;
  });
  safeLS.setItem('hiphop_changes',JSON.stringify({edits,additions,deletions}));
}
function saveVR(id,stars){visitorRatings[id]=stars;safeLS.setItem('hiphop_vr',JSON.stringify(visitorRatings));}

let view='list',activeFilters=[],expandedId=null,editingId=null,covTargetId=null,tCount=0,filterReg=[];
let hofPickerSel=new Set();

function sc(s){return s==null?'sn':s>=8.5?'se':s>=7.5?'sg':s>=6.5?'so':'sl'}
function bc(s){return s==null?'':s>=8.5?'be':s>=7.5?'bg2':s>=6.5?'bo':'bl'}
function ss(s){return s==null?'—':s.toFixed(2)}
function sp(s){return s==null?0:Math.min(100,((s-4)/6)*100)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sid(id){return String(id).replace(/[^a-zA-Z0-9_-]/g,'')}
function cvSm(a){return a.cover?`<div class="cvsm"><img src="${esc(a.cover)}" onerror="this.parentNode.innerHTML='\uD83C\uDFB5'" alt=""></div>`:`<div class="cvsm">\uD83C\uDFB5</div>`;}
function cvLg(a){const s=sid(a.id);if(a.cover)return `<img class="cvlg" src="${esc(a.cover)}" onerror="this.outerHTML='<div class=cvlg-ph onclick=openCovModal(&#39;${s}&#39;)>\uD83C\uDFB5</div>'" alt="">`;return `<div class="cvlgp" onclick="openCovModal('${s}')">\uD83C\uDFB5</div>`;}

function initTheme(){
  const t=safeLS.getItem('hiphop_theme');
  const dark=t?t==='dark':window.matchMedia('(prefers-color-scheme:dark)').matches;
  document.body.className=dark?'dark':'';
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
}

}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',['albums','decades','stats','hof'][i]===name));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  document.getElementById('fab').style.display=(isAdmin&&name==='albums')?'flex':'none';
  document.getElementById('hofab').style.display=(isAdmin&&name==='hof')?'flex':'none';
  if(name==='decades') renderDecades();
  if(name==='stats') renderStats();
  if(name==='hof') renderHof();
}

function toggleFPanel(){document.getElementById('fpanel').classList.toggle('open');if(document.getElementById('fpanel').classList.contains('open'))buildFPanel();}
document.addEventListener('click',e=>{const w=document.getElementById('fwrap');if(w&&!w.contains(e.target))document.getElementById('fpanel').classList.remove('open');});
function toggleFilterChip(i){const id=filterReg[i];if(!id)return;const idx=activeFilters.indexOf(id);if(idx>=0)activeFilters.splice(idx,1);else activeFilters.push(id);buildFPanel();render();}
function clearFilters(){activeFilters=[];buildFPanel();render();}
function buildFPanel(){
  filterReg=[];
  const sf=[{id:'top',label:'≥ 8.5 ⭐'},{id:'good',label:'7.5 – 8.5'},{id:'low',label:'< 7.5'},{id:'unrated',label:'Non notés'},{id:'fav',label:'❤️ Coups de cœur'}];
  const nc={};albums.forEach(a=>a.artist.split(/[;&,\/]|feat\.?|ft\.?|\+| & /i).map(n=>n.trim()).filter(Boolean).forEach(n=>{nc[n]=(nc[n]||0)+1;}));
  const am={};albums.forEach(a=>{const lo=a.artist.toLowerCase();Object.keys(nc).forEach(n=>{if(lo.includes(n.toLowerCase())){if(!am[n])am[n]=new Set();am[n].add(a.id);}});});
  const artists=Object.keys(am).filter(n=>am[n].size>=2).sort((a,b)=>am[b].size-am[a].size);
  document.getElementById('fc-score').innerHTML=sf.map(f=>{const i=filterReg.length;filterReg.push(f.id);return `<button class="fchip ${activeFilters.includes(f.id)?'on':''}" onclick="toggleFilterChip(${i})">${esc(f.label)}</button>`;}).join('');
  document.getElementById('fc-artist').innerHTML=artists.map(n=>{const fid='artist:'+n,i=filterReg.length;filterReg.push(fid);return `<button class="fchip ${activeFilters.includes(fid)?'on':''}" onclick="toggleFilterChip(${i})">${esc(n)} <span style="opacity:.6">${am[n].size}</span></button>`;}).join('');
  const hf=activeFilters.length>0;
  document.getElementById('fbtn').classList.toggle('hf',hf);
  const cb=document.getElementById('fclear');if(cb)cb.style.display=hf?'block':'none';
}
function matchFilters(a){
  if(!activeFilters.length)return true;
  const sf=activeFilters.filter(f=>!f.startsWith('artist:'));
  const af=activeFilters.filter(f=>f.startsWith('artist:'));
  let so=!sf.length;
  for(const f of sf){if(f==='top'&&a.avg!=null&&a.avg>=8.5){so=true;break;}if(f==='good'&&a.avg!=null&&a.avg>=7.5&&a.avg<8.5){so=true;break;}if(f==='low'&&a.avg!=null&&a.avg<7.5){so=true;break;}if(f==='unrated'&&a.avg==null){so=true;break;}if(f==='fav'&&a.fav){so=true;break;}}
  let ao=!af.length;
  for(const f of af){if(a.artist.toLowerCase().includes(f.slice(7).toLowerCase())){ao=true;break;}}
  return so&&ao;
}
function setView(v){view=v;document.getElementById('btn-list').classList.toggle('on',v==='list');document.getElementById('btn-grid').classList.toggle('on',v==='grid');render();}

function buildPanel(a,s){
  const rated=a.tracks.filter(t=>t.grade!=null).length;
  const vr=visitorRatings[a.id]||0;
  const rows=a.tracks.map((t,i)=>{
    const fh=t.feat?`<span class="tf">ft. ${esc(t.feat)}</span>`:'';
    if(t.grade==null)return `<div class="tr"><span class="tn">${i+1}</span><span class="tt" style="color:var(--txt3);font-style:italic">${esc(t.title)}</span>${fh}<span class="tg sn">—</span></div>`;
    return `<div class="tr"><span class="tn">${i+1}</span><span class="tt">${esc(t.title)}</span>${fh}<div class="tb"><div class="tbf ${bc(t.grade)}" style="width:${sp(t.grade)}%"></div></div><span class="tg ${sc(t.grade)}">${t.grade}</span></div>`;
  }).join('');
  const stars=`<div class="str" id="stars-${s}">${[1,2,3,4,5].map(n=>`<span class="st ${vr>=n?'lit':''}" onclick="event.stopPropagation();setVR('${s}',${n})">${vr>=n?'★':'☆'}</span>`).join('')}</div>`;
  let crit='';
  if(a.critique){crit=`<div class="crwrap"><div class="crlbl">✍️ Critique</div><div class="crtext" id="ct-${s}">${esc(a.critique)}</div>${isAdmin?`<button class="credit" onclick="editCrit('${s}')">Modifier</button>`:''}</div>`;}

function render(){
  buildFPanel();
  const q=document.getElementById('search').value.toLowerCase().trim();
  const sort=document.getElementById('sort').value;
  let list=albums.filter(a=>(!q||a.artist.toLowerCase().includes(q)||a.album.toLowerCase().includes(q))&&matchFilters(a));
  list.sort((a,b)=>{
    if(sort==='score-desc')return(b.avg||0)-(a.avg||0);
    if(sort==='score-asc'){if(!a.avg&&!b.avg)return 0;if(!a.avg)return 1;if(!b.avg)return -1;return a.avg-b.avg;}
    if(sort==='year-desc')return(b.year||0)-(a.year||0);
    if(sort==='year-asc'){if(!a.year&&!b.year)return 0;if(!a.year)return 1;if(!b.year)return -1;return a.year-b.year;}
    if(sort==='az')return a.album.localeCompare(b.album);
    if(sort==='za')return b.album.localeCompare(a.album);
    if(sort==='added')return(b.addedAt||0)-(a.addedAt||0);
    return 0;
  });
  const ct=document.getElementById('lview');
  ct.className=view==='grid'?'agrid':'alist';
  if(!list.length){ct.innerHTML='<div class="empty">Aucun résultat</div>';return;}
  if(view==='grid'){
    ct.innerHTML=list.map(a=>{
      const s=sid(a.id),xp=expandedId===a.id,vr=visitorRatings[a.id]||0;
      const cov=a.cover?`<div class="gcov"><img src="${esc(a.cover)}" onerror="this.style.display='none'" alt=""><button class="ghb" onclick="event.stopPropagation();toggleFav('${s}')">${a.fav?'❤️':'🤍'}</button></div>`:`<div class="gcov">🎵<button class="ghb" onclick="event.stopPropagation();toggleFav('${s}')">${a.fav?'❤️':'🤍'}</button></div>`;
      return `<div class="cw ${xp?'xpw':''}"><div class="gc" style="${xp?'border-radius:var(--r) var(--r) 0 0;border-color:var(--acc);border-bottom-color:transparent':''}" onclick="toggleExpand('${s}')">
        ${cov}<div class="gb">
          <div class="gs ${sc(a.avg)}">${ss(a.avg)}<span style="font-size:11px;font-weight:400;color:var(--txt3)">/10</span></div>
          <div class="sb" style="margin-top:3px"><div class="sbf ${bc(a.avg)}" style="width:${sp(a.avg)}%"></div></div>
          <div class="gti">${esc(a.album)}</div><div class="gar"><a href="artist.html?name=${encodeURIComponent(a.artist.split(';')[0].trim())}" onclick="event.stopPropagation()" style="color:var(--txt2);text-decoration:none" onmouseover="this.style.color='var(--acc)'" onmouseout="this.style.color='var(--txt2)'">${esc(a.artist)}</a></div>
          ${a.year?`<div style="font-size:10px;color:var(--txt3);margin-top:1px">${a.year}</div>`:''}
          ${vr?`<div style="font-size:11px;color:#E99F27;margin-top:2px">${'★'.repeat(vr)}${'☆'.repeat(5-vr)}</div>`:''}
        </div>
      </div>${xp?buildPanel(a,s):''}</div>`;
    }).join('');
    return;
  }
  ct.innerHTML=list.map((a,i)=>{
    const s=sid(a.id),xp=expandedId===a.id,vr=visitorRatings[a.id]||0;
    return `<div class="cw"><div class="ac ${xp?'xp':''}" onclick="toggleExpand('${s}')">
      <span class="rnk">${i+1}</span>${cvSm(a)}
      <div class="ai">
        <div class="at">${esc(a.album)}</div><div class="aa"><a href="artist.html?name=${encodeURIComponent(a.artist.split(';')[0].trim())}" onclick="event.stopPropagation()" style="color:var(--txt2);text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--acc)'" onmouseout="this.style.color='var(--txt2)'">${esc(a.artist)}</a></div>
        ${a.year?`<div class="ay">${a.year}</div>`:''}
        ${a.fav?'<div class="afb">❤ Coup de cœur de l’auteur</div>':''}
      </div>
      <div class="asw">
        <div class="asc ${sc(a.avg)}">${ss(a.avg)}</div>
        <div class="sb"><div class="sbf ${bc(a.avg)}" style="width:${sp(a.avg)}%"></div></div>
        ${vr?`<div style="font-size:10px;color:#E99F27;text-align:right;margin-top:2px">${'★'.repeat(vr)}</div>`:''}
      </div>
      <span class="xi">▼</span>
      <button class="hb" onclick="event.stopPropagation();toggleFav('${s}')">${a.fav?'❤️':'🤍'}</button>
    </div>${xp?buildPanel(a,s):''}</div>`;

function toggleExpand(id){
  expandedId=(expandedId===id)?null:id; render();
  if(expandedId){setTimeout(()=>{const p=document.querySelector('.tpan'),a=albums.find(x=>sid(x.id)===expandedId);if(p&&a&&a.cover){const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{try{const c=document.createElement('canvas');c.width=c.height=20;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,20,20);const d=ctx.getImageData(0,0,20,20).data;let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){const br=(d[i]+d[i+1]+d[i+2])/3;if(br>30&&br<220){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}}if(n>0){r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);}const dark=document.body.classList.contains('dark');p.style.backgroundColor=`rgba(${r},${g},${b},${dark?.14:.07})`;p.style.borderColor=`rgba(${r},${g},${b},${dark?.45:.25})`;}catch(e){}};img.src=a.cover;}},50);}
}
function toggleFav(id){
  if(!isAdmin){document.getElementById('login-modal').classList.add('open');return;}

  albums[i]={...albums[i],fav:!albums[i].fav};save();render();
}

      ${bestTr?`<div class="scard"><div class="scval ${sc(bestTr.grade)}">${bestTr.grade}</div><div class="sclbl">Meilleur morceau</div><div class="scsub">${esc(bestTr.title)}</div></div>`:''}

    <div style="display:flex;gap:4px;margin-bottom:24px">${bkts.map((_,i)=>`<div style="flex:1;text-align:center;font-size:10px;color:var(--txt3)">${i}</div>`).join('')}</div>

function saveCov(){if(!isAdmin)return;const url=document.getElementById('cov-url').value.trim();const i=albums.findIndex(x=>sid(x.id)===covTargetId);if(i>=0){albums[i]={...albums[i],cover:url||null};save();}closeCovModal();render();}
function openModal(){if(!isAdmin)return;editingId=null;document.getElementById('mtitle').textContent='Ajouter un album';['f-artist','f-album','f-cover'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-year').value='';document.getElementById('cvprev').innerHTML='🎵';tCount=0;document.getElementById('ted').innerHTML='';addTrack();addTrack();addTrack();document.getElementById('modal').classList.add('open');}
function openEdit(id){if(!isAdmin)return;const a=albums.find(x=>sid(x.id)===id);if(!a)return;editingId=id;document.getElementById('mtitle').textContent='Modifier';document.getElementById('f-artist').value=a.artist;document.getElementById('f-album').value=a.album;document.getElementById('f-year').value=a.year||'';document.getElementById('f-cover').value=a.cover||'';const pv=document.getElementById('cvprev');pv.innerHTML=a.cover?`<img src="${esc(a.cover)}" onerror="this.outerHTML='🎵'" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`:'🎵';tCount=0;document.getElementById('ted').innerHTML='';(a.tracks||[]).forEach(t=>addTrack(t.title,t.grade,t.feat));addTrack();document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function previewCover(){const url=document.getElementById('f-cover').value.trim();const pv=document.getElementById('cvprev');pv.innerHTML=url?`<img src="${esc(url)}" onerror="this.outerHTML='🎵'" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`:'🎵';}
function addTrack(title='',grade='',feat=''){const id=++tCount;const ed=document.getElementById('ted');const row=document.createElement('div');row.className='tir';row.id='ti-'+id;row.innerHTML=`<input type="text" placeholder="Titre" value="${esc(title)}" class="ti-title"><input type="text" placeholder="Feat." value="${esc(feat||'')}" class="tif"><input type="number" placeholder="/10" min="0" max="10" step="0.05" value="${grade!=null&&grade!==''?grade:''}" class="tig"><button class="rmv" onclick="document.getElementById('ti-${id}').remove()">×</button>`;ed.appendChild(row);}
function saveAlbum(){if(!isAdmin)return;const artist=document.getElementById('f-artist').value.trim();const album=document.getElementById('f-album').value.trim();const year=parseInt(document.getElementById('f-year').value)||null;const cover=document.getElementById('f-cover').value.trim()||null;if(!artist||!album){alert('Artiste et album requis.');return;}const tracks=[];document.querySelectorAll('#ted .tir').forEach(r=>{const title=r.querySelector('.ti-title').value.trim();const gv=r.querySelector('.tig').value.trim();const fv=r.querySelector('.tif').value.trim();if(title)tracks.push({title,grade:gv!==''?parseFloat(gv):null,feat:fv||null});});const grades=tracks.filter(t=>t.grade!=null).map(t=>t.grade);const avg=grades.length?Math.round(grades.reduce((s,g)=>s+g,0)/grades.length*1000)/1000:null;if(editingId){const i=albums.findIndex(x=>sid(x.id)===editingId);if(i>=0)albums[i]={...albums[i],artist,album,year,cover,tracks,avg};}else albums.push({id:'u'+Date.now(),artist,album,year,cover,tracks,avg,fav:false,critique:'',hof:false,addedAt:Date.now()});save();closeModal();render();}
function exportData(){const blob=new Blob([JSON.stringify(albums,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hiphop_notes_'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function importData(e){if(!isAdmin){alert('Connexion admin requise.');return;}const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw new Error('Format invalide');if(!confirm('Importer '+data.length+' albums ?'))return;albums=data;save();render();alert('✓ '+data.length+' albums importés !');}catch(err){alert('Erreur : '+err.message);}};reader.readAsText(file);e.target.value='';}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>{initTheme();renderAdminBar();render();});}else{initTheme();renderAdminBar();render();}
</script>
</body>
</html>
