<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hip-Hop Notes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1efe8;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --text: #1a1a1a; --text2: #666; --text3: #999;
  --accent: #5E43CE; --green: #1D9E75; --amber: #BA7517; --red: #A32D2D;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1918; --surface: #242321; --surface2: #2e2c2a;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    --text: #f0ede8; --text2: #aaa; --text3: #666;
    --accent: #9b85f5; --green: #5DCAA5; --amber: #EF9F27; --red: #F09595;
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.header-top h1 { font-size: 20px; font-weight: 600; }
.stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-pill { background: var(--surface2); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text2); }
.stat-pill strong { color: var(--text); font-weight: 600; }

.controls { padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
.search-input { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface2); color: var(--text); outline: none; }
.search-input:focus { border-color: var(--accent); }
.sort-select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface2); color: var(--text); cursor: pointer; outline: none; }
.view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.view-btn { padding: 7px 13px; background: transparent; border: none; cursor: pointer; color: var(--text2); font-size: 15px; transition: background 0.15s; }
.view-btn.active { background: var(--accent); color: white; }

.filters { padding: 12px 20px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); font-size: 13px; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.filter-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }

.album-container { padding: 16px 20px; max-width: 960px; margin: 0 auto; }
.album-list { display: flex; flex-direction: column; gap: 8px; }
.album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }

/* LIST CARD */
.card-wrap { display: flex; flex-direction: column; }
.album-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; cursor: pointer; transition: border-color 0.15s; display: flex; align-items: center; gap: 12px; user-select: none; }
.album-card:hover { border-color: var(--border2); }
.album-card.expanded { border-radius: var(--radius) var(--radius) 0 0; border-color: var(--accent); border-bottom-color: transparent; }
.album-cover-sm { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.album-cover-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.cover-placeholder { width: 44px; height: 44px; border-radius: 6px; background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.album-rank { font-size: 12px; color: var(--text3); min-width: 22px; font-weight: 500; text-align: right; }
.album-info { flex: 1; min-width: 0; }
.album-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-artist { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-score-wrap { text-align: right; flex-shrink: 0; }
.album-score { font-size: 18px; font-weight: 700; }
.score-bar { width: 56px; height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 2px; }
.expand-icon { color: var(--text3); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
.album-card.expanded .expand-icon { transform: rotate(180deg); }

/* TRACKS PANEL */
.tracks-panel { background: var(--surface2); border: 1px solid var(--accent); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
.tracks-panel-inner { padding: 14px 16px; }
.tracks-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
.cover-large { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); }
.cover-large-placeholder { width: 80px; height: 80px; border-radius: 8px; flex-shrink: 0; background: var(--surface); border: 1px dashed var(--border2); display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: border-color 0.15s; }
.cover-large-placeholder:hover { border-color: var(--accent); }
.tracks-meta { flex: 1; }
.tracks-title-text { font-size: 15px; font-weight: 600; }
.tracks-artist-text { font-size: 13px; color: var(--text2); margin-top: 2px; }
.tracks-count { font-size: 12px; color: var(--text3); margin-top: 6px; }
.track-list { border-top: 1px solid var(--border); padding-top: 10px; }
.track-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.track-row:last-child { border-bottom: none; }
.track-num { font-size: 11px; color: var(--text3); min-width: 20px; text-align: right; }
.track-name { flex: 1; font-size: 13px; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-mini-bar { width: 50px; height: 3px; background: var(--surface); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.track-mini-fill { height: 100%; border-radius: 2px; }
.track-grade { font-size: 13px; font-weight: 600; min-width: 38px; text-align: right; }
.panel-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

/* GRID CARD */
.album-card-grid { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; overflow: hidden; }
.album-card-grid:hover { border-color: var(--border2); }
.grid-cover { width: 100%; aspect-ratio: 1; background: var(--surface2); object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden; }
.grid-cover img { width: 100%; height: 100%; object-fit: cover; }
.grid-body { padding: 10px 12px 12px; }
.grid-score { font-size: 20px; font-weight: 700; }
.grid-title { font-size: 13px; font-weight: 600; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.grid-artist { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* SCORE COLORS */
/* Nouvelles nuances de couleurs basées sur tes critères */
.s-9-plus { color: #0E5E44; font-weight: 800; } /* Vert foncé */
.s-8-9    { color: #1D9E75; }                  /* Vert */
.s-7-8    { color: #82C91E; }                  /* Vert clair */
.s-6-7    { color: #FAB005; }                  /* Jaune */
.s-5-6    { color: #FD7E14; }                  /* Orange */
.s-4-5    { color: #E8590C; }                  /* Orange foncé */
.s-below-4 { color: #A32D2D; }                 /* Rouge */

/* Adaptations pour les barres de progression */
.bar-9-plus { background: #0E5E44; }
.bar-8-9    { background: #1D9E75; }
.bar-7-8    { background: #82C91E; }
.bar-6-7    { background: #FAB005; }
.bar-5-6    { background: #FD7E14; }
.bar-4-5    { background: #E8590C; }
.bar-below-4 { background: #A32D2D; }

/* ADD BTN */
.add-btn { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 26px; cursor: pointer; box-shadow: 0 4px 16px rgba(94,67,206,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.15s; z-index: 200; line-height: 1; }
.add-btn:hover { transform: scale(1.08); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface2); color: var(--text); outline: none; }
.form-input:focus { border-color: var(--accent); }
.cover-preview-wrap { display: flex; gap: 10px; align-items: center; }
.cover-preview { width: 50px; height: 50px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); object-fit: cover; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
.cover-preview img { width: 100%; height: 100%; object-fit: cover; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn:hover { opacity: 0.85; }
.tracks-editor { max-height: 260px; overflow-y: auto; margin-bottom: 6px; }
.track-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
.track-input-row input { flex: 1; padding: 7px 9px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--surface2); color: var(--text); outline: none; }
.track-input-row input:focus { border-color: var(--accent); }
.track-input-row .grade-input { width: 66px; flex: none; }
.remove-track-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 0 2px; flex-shrink: 0; }
.add-track-btn { background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: 7px 12px; font-size: 13px; color: var(--text2); cursor: pointer; width: 100%; }
.add-track-btn:hover { border-color: var(--accent); color: var(--accent); }
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }

/* COVER INPUT MODAL */
.cover-modal { background: var(--surface); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 380px; }
.cover-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

@media (max-width: 600px) {
  .album-container { padding: 10px; }
  .controls, .filters, .header { padding-left: 12px; padding-right: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🎧 Hip-Hop Notes</h1>
  </div>
  <div class="stats-row" id="stats-row"></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" type="text" placeholder="Artiste, album…" oninput="render()">
  </div>
  <select class="sort-select" id="sort" onchange="render()">
    <option value="score-desc">Note ↓</option>
    <option value="score-asc">Note ↑</option>
    <option value="az">A → Z</option>
    <option value="za">Z → A</option>
    <option value="added">Récemment ajouté</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-list" onclick="setView('list')" title="Liste">☰</button>
    <button class="view-btn" id="btn-grid" onclick="setView('grid')" title="Grille">⊞</button>
  </div>
</div>

<div class="filters" id="filters"></div>
<div class="album-container"><div id="list-view" class="album-list"></div></div>

<button class="add-btn" onclick="openModal()" title="Ajouter un album">+</button>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modal-title">Ajouter un album</h2>
    <div class="form-group">
      <label>Artiste</label>
      <input class="form-input" id="f-artist" type="text" placeholder="Ex: Kendrick Lamar">
    </div>
    <div class="form-group">
      <label>Album</label>
      <input class="form-input" id="f-album" type="text" placeholder="Ex: good kid, m.A.A.d city">
    </div>
    <div class="form-group">
      <label>Cover (URL d'image)</label>
      <div class="cover-preview-wrap">
        <div class="cover-preview" id="cover-preview">🎵</div>
        <input class="form-input" id="f-cover" type="text" placeholder="https://… ou lien image" oninput="previewCover()">
      </div>
    </div>
    <div class="form-group">
      <label>Morceaux (titre + note /10)</label>
      <div class="tracks-editor" id="tracks-editor"></div>
      <button class="add-track-btn" onclick="addTrackInput()">+ Ajouter un morceau</button>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveAlbum()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- COVER QUICK-EDIT MODAL -->
<div class="modal-overlay" id="cover-modal" onclick="if(event.target===this)closeCoverModal()">
  <div class="cover-modal">
    <h3>Changer la cover</h3>
    <div class="form-group">
      <label>URL de l'image</label>
      <input class="form-input" id="cover-url-input" type="text" placeholder="Colle l'URL d'une image…">
    </div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Astuce : Google Images → clic droit sur une image → "Copier l'adresse de l'image"</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeCoverModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveCover()">Enregistrer</button>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────
let albums = JSON.parse(localStorage.getItem('hiphop_v2') || 'null');
if (!albums) {
  // First load: assign clean IDs and migrate
  albums = INITIAL_DATA.map((a, i) => ({
    ...a,
    id: 'a' + String(i + 1).padStart(3, '0'),
    cover: a.cover || null,
    addedAt: 0
  }));
  save();
}

let view = 'list';
let activeFilter = 'all';
let expandedId = null;
let editingId = null;
let coverTargetId = null;
let trackInputCount = 0;

function save() { localStorage.setItem('hiphop_v2', JSON.stringify(albums)); }

// ── HELPERS ────────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s == null) return 's-none';
  if (s >= 8.5) return 's-excellent';
  if (s >= 7.5) return 's-good';
  if (s >= 6.5) return 's-ok';
  return 's-low';
}
function barClass(s) {
  if (s == null) return '';
  if (s >= 8.5) return 'bar-excellent';
  if (s >= 7.5) return 'bar-good';
  if (s >= 6.5) return 'bar-ok';
  return 'bar-low';
}
function scoreStr(s) { return s == null ? '—' : s.toFixed(2); }
function scorePct(s) { return s == null ? 0 : Math.min(100, ((s - 4) / 6) * 100); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// Safe ID for use in onclick attributes – strip anything non-alphanumeric
function safeId(id) { return String(id).replace(/[^a-zA-Z0-9_-]/g, ''); }

function coverHtmlSm(a) {
  if (a.cover) return `<div class="album-cover-sm"><img src="${esc(a.cover)}" onerror="this.parentNode.innerHTML='🎵'" alt=""></div>`;
  return `<div class="cover-placeholder">🎵</div>`;
}
function coverHtmlGrid(a) {
  if (a.cover) return `<div class="grid-cover"><img src="${esc(a.cover)}" onerror="this.style.display='none'" alt=""></div>`;
  return `<div class="grid-cover">🎵</div>`;
}
function coverHtmlLarge(a) {
  const sid = safeId(a.id);
  if (a.cover) return `<img class="cover-large" src="${esc(a.cover)}" onerror="this.outerHTML='<div class=cover-large-placeholder onclick=openCoverModal(&#39;${sid}&#39;)>🎵</div>'" alt="">`;
  return `<div class="cover-large-placeholder" onclick="openCoverModal('${sid}')">🎵</div>`;
}

// ── STATS ──────────────────────────────────────────────────────────────
function updateStats() {
  const rated = albums.filter(a => a.avg != null);
  const avg = rated.length ? rated.reduce((s, a) => s + a.avg, 0) / rated.length : null;
  const best = rated.length ? rated.reduce((b, a) => a.avg > b.avg ? a : b) : null;
  const totalTracks = albums.reduce((s, a) => s + a.tracks.filter(t => t.grade != null).length, 0);
  document.getElementById('stats-row').innerHTML =
    `<div class="stat-pill"><strong>${albums.length}</strong> albums</div>` +
    `<div class="stat-pill"><strong>${rated.length}</strong> notés</div>` +
    `<div class="stat-pill">Moy. <strong class="${scoreClass(avg)}">${avg ? avg.toFixed(2) : '—'}</strong></div>` +
    `<div class="stat-pill"><strong>${totalTracks}</strong> morceaux notés</div>` +
    (best ? `<div class="stat-pill">🏆 <strong>${esc(best.album)}</strong></div>` : '');
}

// ── FILTERS ────────────────────────────────────────────────────────────
function buildFilters() {
  // For artist filters: show artist if ANY album lists them (artist field OR contains their name)
  // We collect all unique artist names that appear in at least 2 albums (searching in artist field)
  const nameCount = {};
  albums.forEach(a => {
    // Split on common separators to catch collabs
    const names = a.artist.split(/[;&,\/]|feat\.?|ft\.?|\+| & /i).map(n => n.trim()).filter(Boolean);
    names.forEach(n => { nameCount[n] = (nameCount[n] || 0) + 1; });
  });
  // Also count albums where artist field contains the name (for collabs)
  const artistAlbumCount = {};
  albums.forEach(a => {
    const aLow = a.artist.toLowerCase();
    Object.keys(nameCount).forEach(n => {
      if (aLow.includes(n.toLowerCase())) {
        artistAlbumCount[n] = (artistAlbumCount[n] || new Set());
        artistAlbumCount[n].add(a.id);
      }
    });
  });
  const multiArtists = Object.keys(artistAlbumCount)
    .filter(n => artistAlbumCount[n].size >= 2)
    .sort((a, b) => artistAlbumCount[b].size - artistAlbumCount[a].size);

  const filters = [
    {id: 'all', label: 'Tous'},
    {id: 'top', label: '≥ 8.5'},
    {id: 'good', label: '7.5 – 8.5'},
    {id: 'unrated', label: 'Non notés'},
    ...multiArtists.map(n => ({id: 'artist:' + n, label: n + ' (' + artistAlbumCount[n].size + ')'}))
  ];

  document.getElementById('filters').innerHTML = filters.map(f =>
    `<button class="filter-btn ${activeFilter === f.id ? 'active' : ''}" onclick="setFilter(${JSON.stringify(f.id)})">${esc(f.label)}</button>`
  ).join('');
}

function setFilter(id) { activeFilter = id; render(); }
function setView(v) {
  view = v;
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-grid').classList.toggle('active', v === 'grid');
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render() {
  buildFilters();
  updateStats();

  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;

  let filtered = albums.filter(a => {
    const matchSearch = !q || a.artist.toLowerCase().includes(q) || a.album.toLowerCase().includes(q);
    let matchFilter = true;
    if (activeFilter === 'top') matchFilter = a.avg != null && a.avg >= 8.5;
    else if (activeFilter === 'good') matchFilter = a.avg != null && a.avg >= 7.5 && a.avg < 8.5;
    else if (activeFilter === 'unrated') matchFilter = a.avg == null;
    else if (activeFilter.startsWith('artist:')) {
      const name = activeFilter.slice(7).toLowerCase();
      matchFilter = a.artist.toLowerCase().includes(name);
    }
    return matchSearch && matchFilter;
  });

  filtered.sort((a, b) => {
    if (sort === 'score-desc') return (b.avg || 0) - (a.avg || 0);
    if (sort === 'score-asc') { if (!a.avg && !b.avg) return 0; if (!a.avg) return 1; if (!b.avg) return -1; return a.avg - b.avg; }
    if (sort === 'az') return a.album.localeCompare(b.album);
    if (sort === 'za') return b.album.localeCompare(a.album);
    if (sort === 'added') return (b.addedAt || 0) - (a.addedAt || 0);
    return 0;
  });

  const container = document.getElementById('list-view');
  container.className = view === 'grid' ? 'album-grid' : 'album-list';

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Aucun résultat</div>';
    return;
  }

  if (view === 'grid') {
    container.innerHTML = filtered.map(a => {
      const sid = safeId(a.id);
      return `<div class="album-card-grid" onclick="openEdit('${sid}')">
        ${coverHtmlGrid(a)}
        <div class="grid-body">
          <div class="grid-score ${scoreClass(a.avg)}">${scoreStr(a.avg)}<span style="font-size:12px;font-weight:400;color:var(--text3)">/10</span></div>
          <div class="score-bar" style="margin-top:4px"><div class="score-bar-fill ${barClass(a.avg)}" style="width:${scorePct(a.avg)}%"></div></div>
          <div class="grid-title">${esc(a.album)}</div>
          <div class="grid-artist">${esc(a.artist)}</div>
        </div>
      </div>`;
    }).join('');
    return;
  }

  // LIST VIEW
  container.innerHTML = filtered.map((a, i) => {
    const sid = safeId(a.id);
    const isExpanded = expandedId === a.id;
    const ratedCount = a.tracks.filter(t => t.grade != null).length;

    let tracksHtml = '';
    if (isExpanded) {
      const rows = a.tracks.map((t, ti) => {
        if (t.grade == null) {
          return `<div class="track-row"><span class="track-num">${ti+1}</span><span class="track-name" style="color:var(--text3);font-style:italic">${esc(t.title)}</span><span class="track-grade s-none">—</span></div>`;
        }
        return `<div class="track-row">
          <span class="track-num">${ti+1}</span>
          <span class="track-name">${esc(t.title)}</span>
          <div class="track-mini-bar"><div class="track-mini-fill ${barClass(t.grade)}" style="width:${scorePct(t.grade)}%"></div></div>
          <span class="track-grade ${scoreClass(t.grade)}">${t.grade}</span>
        </div>`;
      }).join('');

      tracksHtml = `<div class="tracks-panel">
        <div class="tracks-panel-inner">
          <div class="tracks-header">
            ${coverHtmlLarge(a)}
            <div class="tracks-meta">
              <div class="tracks-title-text">${esc(a.album)}</div>
              <div class="tracks-artist-text">${esc(a.artist)}</div>
              <div class="tracks-count">${ratedCount} / ${a.tracks.length} morceaux notés</div>
            </div>
          </div>
          <div class="track-list">${rows}</div>
          <div class="panel-actions">
            <button class="btn" style="font-size:12px;padding:6px 12px" onclick="openCoverModal('${sid}')">🖼 Cover</button>
            <button class="btn" style="font-size:12px;padding:6px 12px" onclick="openEdit('${sid}')">✏️ Modifier</button>
            <button class="btn" style="font-size:12px;padding:6px 12px;color:var(--red);border-color:var(--red)" onclick="deleteAlbum('${sid}')">Supprimer</button>
          </div>
        </div>
      </div>`;
    }

    return `<div class="card-wrap" id="wrap-${sid}">
      <div class="album-card ${isExpanded ? 'expanded' : ''}" id="card-${sid}" onclick="toggleExpand('${sid}')">
        <span class="album-rank">${i+1}</span>
        ${coverHtmlSm(a)}
        <div class="album-info">
          <div class="album-title">${esc(a.album)}</div>
          <div class="album-artist">${esc(a.artist)}</div>
        </div>
        <div class="album-score-wrap">
          <div class="album-score ${scoreClass(a.avg)}">${scoreStr(a.avg)}</div>
          <div class="score-bar"><div class="score-bar-fill ${barClass(a.avg)}" style="width:${scorePct(a.avg)}%"></div></div>
        </div>
        <span class="expand-icon">▼</span>
      </div>
      ${tracksHtml}
    </div>`;
  }).join('');
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

// ── DELETE ─────────────────────────────────────────────────────────────
function deleteAlbum(id) {
  if (!confirm('Supprimer cet album ?')) return;
  albums = albums.filter(a => safeId(a.id) !== id);
  if (expandedId && safeId(expandedId) === id) expandedId = null;
  save(); render();
}

// ── COVER MODAL ────────────────────────────────────────────────────────
function openCoverModal(id) {
  coverTargetId = id;
  const a = albums.find(x => safeId(x.id) === id);
  document.getElementById('cover-url-input').value = (a && a.cover) ? a.cover : '';
  document.getElementById('cover-modal').classList.add('open');
}
function closeCoverModal() {
  document.getElementById('cover-modal').classList.remove('open');
  coverTargetId = null;
}
function saveCover() {
  const url = document.getElementById('cover-url-input').value.trim();
  const idx = albums.findIndex(x => safeId(x.id) === coverTargetId);
  if (idx >= 0) { albums[idx].cover = url || null; save(); }
  closeCoverModal();
  render();
}

// ── ADD / EDIT MODAL ───────────────────────────────────────────────────
function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Ajouter un album';
  document.getElementById('f-artist').value = '';
  document.getElementById('f-album').value = '';
  document.getElementById('f-cover').value = '';
  document.getElementById('cover-preview').innerHTML = '🎵';
  trackInputCount = 0;
  document.getElementById('tracks-editor').innerHTML = '';
  addTrackInput(); addTrackInput(); addTrackInput();
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const a = albums.find(x => safeId(x.id) === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Modifier l\'album';
  document.getElementById('f-artist').value = a.artist;
  document.getElementById('f-album').value = a.album;
  document.getElementById('f-cover').value = a.cover || '';
  const prev = document.getElementById('cover-preview');
  prev.innerHTML = a.cover ? `<img src="${esc(a.cover)}" onerror="this.outerHTML='🎵'" style="width:100%;height:100%;object-fit:cover;border-radius:6px">` : '🎵';
  trackInputCount = 0;
  document.getElementById('tracks-editor').innerHTML = '';
  a.tracks.forEach(t => addTrackInput(t.title, t.grade));
  addTrackInput();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function previewCover() {
  const url = document.getElementById('f-cover').value.trim();
  const prev = document.getElementById('cover-preview');
  if (url) {
    prev.innerHTML = `<img src="${esc(url)}" onerror="this.outerHTML='🎵'" style="width:100%;height:100%;object-fit:cover;border-radius:6px">`;
  } else {
    prev.innerHTML = '🎵';
  }
}

function addTrackInput(title = '', grade = '') {
  const id = ++trackInputCount;
  const ed = document.getElementById('tracks-editor');
  const row = document.createElement('div');
  row.className = 'track-input-row';
  row.id = 'tr-' + id;
  row.innerHTML =
    `<input type="text" placeholder="Titre" value="${esc(title)}" class="track-title-input">` +
    `<input type="number" placeholder="/10" min="0" max="10" step="0.05" value="${grade != null && grade !== '' ? grade : ''}" class="grade-input track-grade-input">` +
    `<button class="remove-track-btn" onclick="document.getElementById('tr-${id}').remove()">×</button>`;
  ed.appendChild(row);
}

function saveAlbum() {
  const artist = document.getElementById('f-artist').value.trim();
  const albumName = document.getElementById('f-album').value.trim();
  const cover = document.getElementById('f-cover').value.trim() || null;
  if (!artist || !albumName) { alert('Artiste et album requis.'); return; }

  const tracks = [];
  document.querySelectorAll('#tracks-editor .track-input-row').forEach(row => {
    const title = row.querySelector('.track-title-input').value.trim();
    const gv = row.querySelector('.track-grade-input').value.trim();
    if (title) tracks.push({ title, grade: gv !== '' ? parseFloat(gv) : null });
  });

  const grades = tracks.filter(t => t.grade != null).map(t => t.grade);
  const avg = grades.length ? Math.round(grades.reduce((s, g) => s + g, 0) / grades.length * 1000) / 1000 : null;

  if (editingId) {
    const idx = albums.findIndex(x => safeId(x.id) === editingId);
    if (idx >= 0) albums[idx] = { ...albums[idx], artist, album: albumName, cover, tracks, avg };
  } else {
    const newId = 'u' + Date.now();
    albums.push({ id: newId, artist, album: albumName, cover, tracks, avg, addedAt: Date.now() });
  }

  save(); closeModal(); render();
}

// ── INIT ───────────────────────────────────────────────────────────────
render();
</script>
