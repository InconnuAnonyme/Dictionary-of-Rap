<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Dictionary of Rap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--surface2:#f1efe8;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --accent:#5E43CE;--green:#1D9E75;--amber:#BA7517;--red:#A32D2D;
  --r:12px;--rs:8px;
}
/* theme handled by JS */
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-row h1{font-size:18px;font-weight:600;flex:1;min-width:120px}
.stats-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.spill{background:var(--surface2);border-radius:20px;padding:4px 11px;font-size:12px;color:var(--text2)}
.spill strong{color:var(--text);font-weight:600}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 18px}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none}
.tab-pane.on{display:block}

/* CONTROLS */
.ctrl{padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srch{flex:1;min-width:160px;position:relative}
.srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.srch input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface2);color:var(--text);outline:none}
.srch input:focus{border-color:var(--accent)}
.ctrl select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface2);color:var(--text);cursor:pointer;outline:none}
.view-tog{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.vbtn{padding:6px 12px;background:transparent;border:none;cursor:pointer;color:var(--text2);font-size:14px}
.vbtn.on{background:var(--accent);color:#fff}

/* FILTER POPOVER */
.filter-wrap{position:relative}
.filter-icon-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap}
.filter-icon-btn.has-filter{border-color:var(--accent);color:var(--accent)}
.fdot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:none}
.filter-icon-btn.has-filter .fdot{display:inline-block}
.fpanel{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;z-index:200;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.fpanel.open{display:block}
.fsec{margin-bottom:14px}
.fsec:last-child{margin-bottom:0}
.fsec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.fchips{display:flex;flex-wrap:wrap;gap:6px}
.fchip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;background:transparent;color:var(--text2);cursor:pointer}
.fchip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.fchip:hover:not(.on){border-color:var(--border2);color:var(--text)}
.fclose{margin-top:10px;width:100%;padding:7px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}

/* IO BUTTONS */
.io-btn{padding:6px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;background:var(--surface2);color:var(--text2);cursor:pointer;white-space:nowrap}
.io-btn:hover{border-color:var(--border2);color:var(--text)}

/* ALBUM LIST */
.list-wrap{padding:14px 18px;max-width:960px;margin:0 auto}
.album-list{display:flex;flex-direction:column;gap:8px}
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.album-grid .card-wrap.xp-wrap{grid-column:1/-1}

/* LIST CARD */
.card-wrap{display:flex;flex-direction:column}
.acard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;user-select:none;transition:border-color .15s}
.acard:hover{border-color:var(--border2)}
.acard.xp{border-radius:var(--r) var(--r) 0 0;border-color:var(--accent);border-bottom-color:transparent}
.arank{font-size:11px;color:var(--text3);min-width:20px;text-align:right}
.cvsm{width:42px;height:42px;border-radius:6px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden}
.cvsm img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.ainfo{flex:1;min-width:0}
.atitle{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aartist{font-size:12px;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ayear{font-size:11px;color:var(--text3);margin-top:1px}
.afav-badge{font-size:10px;font-weight:600;color:#e03;margin-top:2px;letter-spacing:.3px}
.ascw{text-align:right;flex-shrink:0}
.ascore{font-size:17px;font-weight:700}
.sbar{width:50px;height:3px;background:var(--surface2);border-radius:2px;margin-top:3px;overflow:hidden}
.sbar-f{height:100%;border-radius:2px}
.xicon{color:var(--text3);font-size:10px;transition:transform .2s;flex-shrink:0}
.acard.xp .xicon{transform:rotate(180deg)}
.hbtn{background:none;border:none;cursor:pointer;font-size:17px;padding:0 2px;flex-shrink:0;line-height:1;transition:transform .15s}
.hbtn:hover{transform:scale(1.2)}

/* TRACKS PANEL */
.tpanel{background:var(--surface2);border:1px solid var(--accent);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.tpanel-in{padding:13px 15px}
.tphdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:11px}
.cvlg{width:76px;height:76px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface);border:1px solid var(--border)}
.cvlg-ph{width:76px;height:76px;border-radius:8px;flex-shrink:0;background:var(--surface);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer}
.cvlg-ph:hover{border-color:var(--accent)}
.tmeta{flex:1}
.tmeta-title{font-size:14px;font-weight:600}
.tmeta-artist{font-size:12px;color:var(--text2);margin-top:2px}
.tmeta-year{font-size:12px;color:var(--text3);margin-top:1px}
.tmeta-count{font-size:11px;color:var(--text3);margin-top:5px}
.tlist{border-top:1px solid var(--border);padding-top:9px}
.trow{display:flex;align-items:center;gap:9px;padding:4px 0;border-bottom:1px solid var(--border)}
.trow:last-child{border-bottom:none}
.tnum{font-size:11px;color:var(--text3);min-width:18px;text-align:right}
.tname{flex:1;font-size:12px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tfeat{font-size:11px;color:var(--text3);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbar{width:44px;height:3px;background:var(--surface);border-radius:2px;overflow:hidden;flex-shrink:0}
.tbar-f{height:100%;border-radius:2px}
.tgrade{font-size:12px;font-weight:600;min-width:34px;text-align:right}
.pactions{display:flex;gap:7px;justify-content:flex-end;margin-top:11px;flex-wrap:wrap}

/* GRID CARD */
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;overflow:hidden;transition:border-color .15s}
.gcard:hover{border-color:var(--border2)}
.gcov-wrap{position:relative;width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden}
.gcov-wrap img{width:100%;height:100%;object-fit:cover}
.gcov-hbtn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.5);border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;line-height:1}
.gbody{padding:9px 11px 11px}
.gscore{font-size:19px;font-weight:700}
.gtitle{font-size:12px;font-weight:600;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gartist{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SCORE COLORS */
.se{color:var(--green)}.sg{color:var(--accent)}.so{color:var(--amber)}.sl{color:var(--red)}.sn{color:var(--text3)}
.be{background:var(--green)}.bg2{background:var(--accent)}.bo{background:var(--amber)}.bl{background:var(--red)}

/* FAB */
.fab{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#fff;border:none;border-radius:50%;width:50px;height:50px;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 14px rgba(94,67,206,.4)}
.fab:hover{transform:scale(1.07)}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:18px}
.ov.open{display:flex}
.mdl{background:var(--surface);border-radius:var(--r);padding:22px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.mdl h2{font-size:17px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--surface2);color:var(--text);outline:none}
.fi:focus{border-color:var(--accent)}
.cvpw{display:flex;gap:9px;align-items:center}
.cvpv{width:48px;height:48px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;flex-shrink:0}
.macts{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}
.btn{padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn:hover{opacity:.85}
.ted{max-height:240px;overflow-y:auto;margin-bottom:5px}
.tir{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.tir input{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;background:var(--surface2);color:var(--text);outline:none;min-width:0}
.tir input:focus{border-color:var(--accent)}
.tir .ti-grade{width:58px;flex:none}
.tir .ti-feat{width:100px;flex:none}
.rmv{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:17px;padding:0 2px;flex-shrink:0}
.add-t{background:transparent;border:1px dashed var(--border2);border-radius:var(--rs);padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer;width:100%}
.add-t:hover{border-color:var(--accent);color:var(--accent)}
.cvmdl{background:var(--surface);border-radius:var(--r);padding:20px;width:100%;max-width:360px}
.cvmdl h3{font-size:15px;font-weight:600;margin-bottom:13px}
.empty{text-align:center;padding:44px;color:var(--text3);font-size:14px}

/* STATS TAB */
.stats-wrap{padding:20px 18px;max-width:960px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.stat-val{font-size:28px;font-weight:700}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--text2);min-width:130px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-val{font-size:12px;font-weight:600;min-width:36px}
.dist-wrap{display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:24px}
.dist-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.dist-bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .4s ease}
.dist-lbl{font-size:10px;color:var(--text3)}

/* DECADES TAB */
.decade-wrap{padding:16px 18px;max-width:960px;margin:0 auto}
.decade-section{margin-bottom:28px}
.decade-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--accent)}
.decade-title{font-size:18px;font-weight:700;color:var(--accent)}
.decade-count{font-size:13px;color:var(--text3)}
.decade-avg{font-size:13px;font-weight:600;margin-left:auto}

@media(max-width:600px){.list-wrap,.ctrl,.hdr,.decade-wrap,.stats-wrap{padding-left:12px;padding-right:12px}.bar-label{min-width:90px}}
/* SCORES SIDE BY SIDE */
.scores-row{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap}
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;flex:1;min-width:120px}
.score-box-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.score-box-val{font-size:22px;font-weight:700}
.score-box-sub{font-size:11px;color:var(--text3);margin-top:2px}
.star-rating{display:flex;gap:3px;margin-top:6px}
.star{font-size:22px;cursor:pointer;line-height:1;color:var(--text3);transition:transform .1s}
.star.lit{color:#E99F27}
.star:hover{transform:scale(1.15)}
/* CRITIQUE */
.critique-wrap{margin:10px 0}
.critique-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--text3);margin-bottom:6px}
.critique-text{font-size:13px;line-height:1.65;color:var(--text);white-space:pre-wrap;font-style:italic;padding:10px 12px;background:var(--surface);border-radius:var(--rs);border:1px solid var(--border)}
.critique-ta{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;line-height:1.65;background:var(--surface2);color:var(--text);outline:none;resize:vertical;min-height:90px;font-family:inherit;font-style:italic}
.critique-ta:focus{border-color:var(--accent)}
.critique-save-btn,.critique-edit-btn{margin-top:6px;padding:5px 14px;border:1px solid var(--accent);border-radius:var(--rs);background:var(--accent);color:#fff;font-size:12px;cursor:pointer}
.critique-edit-btn{background:transparent;color:var(--accent)}
/* FILTER CLEAR */
.fclear{margin-top:6px;width:100%;padding:5px;border:none;border-radius:var(--rs);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;text-align:left}

/* ─── LIGHT/DARK TOGGLE ─── */
.theme-btn{padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:15px;line-height:1}
body.light{--bg:#f8f7f4;--surface:#fff;--surface2:#f1efe8;--border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);--text:#1a1a1a;--text2:#666;--text3:#999;--accent:#5E43CE;--green:#1D9E75;--amber:#BA7517;--red:#A32D2D}
body.dark{--bg:#1a1918;--surface:#242321;--surface2:#2e2c2a;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);--text:#f0ede8;--text2:#aaa;--text3:#555;--accent:#9b85f5;--green:#5DCAA5;--amber:#EF9F27;--red:#F09595}
/* ─── SCORE LABELS ─── */
.score-box-label{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
/* ─── HOF ─── */
.hof-wrap{padding:0 0 40px}
.hof-hero{background:linear-gradient(160deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:40px 24px 32px;text-align:center;position:relative;overflow:hidden}
.hof-hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hof-title{font-size:28px;font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:4px;position:relative}
.hof-title span{color:#FFD700}
.hof-subtitle{font-size:13px;color:rgba(255,255,255,.5);position:relative}
.hof-count{display:inline-block;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);color:#FFD700;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;margin-top:12px;position:relative}
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:8px;padding:32px 20px 0;background:linear-gradient(180deg,#0f3460 0%,var(--bg) 60%)}
.podium-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s}
.podium-item:hover{transform:translateY(-4px)}
.podium-item.p1{order:2}.podium-item.p2{order:1}.podium-item.p3{order:3}
.podium-cover{border-radius:10px;object-fit:cover;box-shadow:0 8px 32px rgba(0,0,0,.4);flex-shrink:0}
.p1 .podium-cover{width:130px;height:130px}
.p2 .podium-cover,.p3 .podium-cover{width:100px;height:100px}
.podium-rank{font-size:28px;margin-bottom:4px}
.podium-score{font-size:18px;font-weight:800;margin-top:8px}
.p1 .podium-score{font-size:22px}
.podium-title{font-size:12px;font-weight:600;color:#fff;text-align:center;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
.p2 .podium-title,.p3 .podium-title{max-width:110px;opacity:.85}
.podium-artist{font-size:11px;color:rgba(255,255,255,.55);text-align:center;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podium-base{width:100%;border-radius:8px 8px 0 0;margin-top:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:rgba(0,0,0,.25)}
.p1 .podium-base{background:linear-gradient(180deg,#FFD700,#FFA500);height:70px;min-width:130px}
.p2 .podium-base{background:linear-gradient(180deg,#C0C0C0,#A9A9A9);height:52px;min-width:110px}
.p3 .podium-base{background:linear-gradient(180deg,#CD7F32,#A0522D);height:38px;min-width:110px}
.hof-list{padding:24px 18px;max-width:800px;margin:0 auto}
.hof-section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.hof-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.hof-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.hof-card-top{display:flex;gap:0;cursor:pointer}
.hof-cover{width:100px;height:100px;object-fit:cover;flex-shrink:0}
.hof-cover-ph{width:100px;height:100px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px}
.hof-info{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:space-between}
.hof-info-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hof-album-title{font-size:16px;font-weight:700}
.hof-album-artist{font-size:13px;color:var(--text2);margin-top:3px}
.hof-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.hof-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.hof-badge.fav{background:rgba(220,0,51,.1);color:#e03}
.hof-score-big{font-size:28px;font-weight:800;line-height:1;flex-shrink:0}
.hof-critique{padding:14px 16px;border-top:1px solid var(--border);font-size:13px;line-height:1.7;font-style:italic;color:var(--text2)}
.hof-critique-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px;font-style:normal;display:block}
.hof-no-critique{padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);font-style:italic}
.hof-rank-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(255,215,0,.15);color:#b8860b;border:1px solid rgba(255,215,0,.3)}
body.dark .hof-rank-badge{color:#FFD700}
.hof-empty{text-align:center;padding:60px 24px;color:var(--text3)}
.hof-empty-icon{font-size:48px;margin-bottom:12px}
.hof-toggle-btn{padding:5px 12px;border-radius:var(--rs);font-size:11px;cursor:pointer;border:1px solid;transition:all .15s;background:rgba(255,215,0,.1);color:#b8860b;border-color:rgba(255,215,0,.4)}
.hof-toggle-btn:hover{background:rgba(255,215,0,.22)}
.hof-toggle-btn.in-hof{background:rgba(255,215,0,.25);border-color:rgba(255,215,0,.7)}
body.dark .hof-toggle-btn{color:#FFD700;border-color:rgba(255,215,0,.5)}

.tpanel{transition:background-color .5s,border-color .5s}

<body>

<div id="admin-bar" style="display:none;background:var(--accent);color:#fff;font-size:12px;padding:6px 18px;align-items:center;gap:10px;position:sticky;top:0;z-index:101"></div>

<div class="hdr">
  <div class="hdr-row">
    <h1 id="site-title">The Dictionary of Rap</h1>
    <a href="rap_map.html" style="font-size:12px;color:var(--text2);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:var(--rs)">🗺 Carte</a>
    <div style="display:flex;gap:6px">
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <button class="io-btn" onclick="document.getElementById('login-modal').classList.add('open')">🔐 Admin</button>
      <button class="io-btn" onclick="exportData()">⬇ Export</button>
      <label class="io-btn">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    </div>
  </div>
  <div class="stats-row" id="srow"></div>
</div>

<div class="tabs">
  <div class="tab on" onclick="switchTab('albums')">Albums</div>
  <div class="tab" onclick="switchTab('decades')">Décennies</div>
  <div class="tab" onclick="switchTab('stats')">Stats</div>
  <div class="tab" onclick="switchTab('hof')">🏆 Hall of Fame</div>
</div>

<!-- ALBUMS TAB -->
<div class="tab-pane on" id="tab-albums">
  <div class="ctrl">
    <div class="srch">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Artiste, album…" oninput="render()">
    </div>
    <div class="filter-wrap" id="fwrap">
      <button class="filter-icon-btn" id="fbtn" onclick="toggleFPanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        Filtres <span class="fdot" id="fdot"></span>
      </button>
      <div class="fpanel" id="fpanel">
        <div class="fsec"><div class="fsec-title">Notes</div><div class="fchips" id="fc-score"></div></div>
        <div class="fsec"><div class="fsec-title">Artistes</div><div class="fchips" id="fc-artist"></div></div>
        <button class="fclear" id="fclear-btn" onclick="clearFilters()" style="display:none">✕ Effacer tous les filtres</button>
        <button class="fclose" onclick="toggleFPanel()">Fermer</button>
      </div>
    </div>
    <select id="sort" onchange="render()">
      <option value="score-desc">Note ↓</option>
      <option value="score-asc">Note ↑</option>
      <option value="year-desc">Année (récent)</option>
      <option value="year-asc">Année (ancien)</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="added">Récemment ajouté</option>
    </select>
    <div class="view-tog">
      <button class="vbtn on" id="btn-list" onclick="setView('list')">☰</button>
      <button class="vbtn" id="btn-grid" onclick="setView('grid')">⊞</button>
    </div>
  </div>
  <div class="list-wrap"><div id="lview" class="album-list"></div></div>
</div>

<!-- DECADES TAB -->
<div class="tab-pane" id="tab-decades">
  <div class="decade-wrap" id="decades-content"></div>
</div>

<!-- STATS TAB -->
<div class="tab-pane" id="tab-stats">
  <div class="stats-wrap" id="stats-content"></div>
</div>

<button class="fab" id="fab" onclick="openModal()" style="display:none">+</button>


<!-- LOGIN MODAL -->
<div class="ov" id="login-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div style="background:var(--surface);border-radius:var(--r);padding:28px;width:100%;max-width:320px;text-align:center">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:6px">🔐 Mode admin</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:18px">Entre le mot de passe pour modifier</p>
    <input class="fi" id="pwd-input" type="password" placeholder="Mot de passe…" onkeydown="if(event.key==='Enter')tryLogin()">
    <div id="pwd-err" style="color:var(--red);font-size:12px;margin-top:8px;min-height:18px"></div>
    <div class="macts">
      <button class="btn" onclick="document.getElementById('login-modal').classList.remove('open')">Annuler</button>
      <button class="btn btn-p" onclick="tryLogin()">Connexion</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="ov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="mdl">
    <h2 id="mtitle">Ajouter un album</h2>
    <div class="fg"><label>Artiste</label><input class="fi" id="f-artist" type="text" placeholder="Ex: Kendrick Lamar"></div>
    <div class="fg"><label>Album</label><input class="fi" id="f-album" type="text" placeholder="Ex: good kid, m.A.A.d city"></div>
    <div class="fg"><label>Année de sortie</label><input class="fi" id="f-year" type="number" placeholder="Ex: 2012" min="1970" max="2030" style="width:140px"></div>
    <div class="fg">
      <label>Cover (URL image)</label>
      <div class="cvpw">
        <div class="cvpv" id="cvprev">🎵</div>
        <input class="fi" id="f-cover" type="text" placeholder="https://…" oninput="previewCover()">
      </div>
    </div>
    <div class="fg">
      <label>Morceaux</label>
      <div style="display:flex;gap:5px;margin-bottom:5px">
        <span style="flex:1;font-size:11px;color:var(--text3)">Titre</span>
        <span style="width:100px;font-size:11px;color:var(--text3)">Feat.</span>
        <span style="width:58px;font-size:11px;color:var(--text3)">Note</span>
        <span style="width:22px"></span>
      </div>
      <div class="ted" id="ted"></div>
      <button class="add-t" onclick="addTrack()">+ Ajouter un morceau</button>
    </div>
    <div class="macts">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-p" onclick="saveAlbum()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- COVER MODAL -->
<div class="ov" id="cov-modal" onclick="if(event.target===this)closeCoverModal()">
  <div class="cvmdl">
    <h3>Changer la cover</h3>
    <div class="fg"><label>URL de l'image</label><input class="fi" id="cov-url" type="text" placeholder="Colle l'URL ici…"></div>
    <p style="font-size:11px;color:var(--text3);margin-bottom:11px">💡 Google Images → clic droit → "Copier l'adresse de l'image"</p>
    <div class="macts">
      <button class="btn" onclick="closeCoverModal()">Annuler</button>
      <button class="btn btn-p" onclick="saveCover()">OK</button>
    </div>
  </div>
</div>

const ADMIN_PASSWORD = "hiphop2024";
let isAdmin = safeStorage.getItem('hiphop_admin') === 'yes';

function tryLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === ADMIN_PASSWORD) {
    isAdmin = true;
    safeStorage.setItem('hiphop_admin', 'yes');
    document.getElementById('login-modal').classList.remove('open');
    document.getElementById('pwd-err').textContent = '';
    document.getElementById('pwd-input').value = '';
    renderAdminBar(); render();
  } else {
    document.getElementById('pwd-err').textContent = 'Mot de passe incorrect.';
  }
}
function logout() {
  isAdmin = false; safeStorage.removeItem('hiphop_admin');
  renderAdminBar(); render();
}
function renderAdminBar() {
  const bar = document.getElementById('admin-bar');
  bar.style.display = isAdmin ? 'flex' : 'none';
  if (isAdmin) bar.innerHTML = '<span>🔐 Mode admin activé</span><button onclick="logout()">Se déconnecter</button>';
  document.getElementById('fab').style.display = isAdmin ? 'flex' : 'none';
}

const BASE_DATA = INITIAL_DATA.map(a => ({
  ...a, cover: a.cover||null, year: a.year||null, fav: a.fav||false, critique: a.critique||'',
  tracks: (a.tracks||[]).map(t => ({title:t.title, grade:t.grade??null, feat:t.feat||null}))
}));

function loadAlbums() {
  const ch = JSON.parse(safeStorage.getItem('hiphop_changes')||'{"edits":{},"additions":[],"deletions":[]}');
  let list = BASE_DATA.filter(a => !ch.deletions.includes(a.id)).map(a => ch.edits[a.id] ? {...a, ...ch.edits[a.id]} : a);
  return list.concat(ch.additions||[]);
}

let albums = loadAlbums();
let visitorRatings = JSON.parse(safeStorage.getItem('hiphop_vr')||'{}');

function save() {
  const baseMap = Object.fromEntries(BASE_DATA.map(a => [a.id, a]));
  const additions = albums.filter(a => !baseMap[a.id]);
  const deletions = BASE_DATA.filter(b => !albums.find(a => a.id===b.id)).map(b => b.id);
  const edits = {};
  albums.forEach(a => {
    const base = baseMap[a.id]; if (!base) return;
    const diff = {};
    ['artist','album','year','cover','tracks','avg','fav','critique','hof'].forEach(k => {
      if (JSON.stringify(a[k]) !== JSON.stringify(base[k])) diff[k] = a[k];
    });
    if (Object.keys(diff).length) edits[a.id] = diff;
  });
  safeStorage.setItem('hiphop_changes', JSON.stringify({edits, additions, deletions}));
}
function saveVR(id, stars) { visitorRatings[id] = stars; safeStorage.setItem('hiphop_vr', JSON.stringify(visitorRatings)); }

let view='list', activeFilters=[], expandedId=null, editingId=null, coverTargetId=null, tCount=0, filterRegistry=[];

function sc(s){return s==null?'sn':s>=8.5?'se':s>=7.5?'sg':s>=6.5?'so':'sl'}
function bc(s){return s==null?'':s>=8.5?'be':s>=7.5?'bg2':s>=6.5?'bo':'bl'}
function ss(s){return s==null?'—':s.toFixed(2)}
function sp(s){return s==null?0:Math.min(100,((s-4)/6)*100)}
function esc(s){return String(s||''). replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function sid(id){return String(id).replace(/[^a-zA-Z0-9_-]/g,'')}

function cvSm(a){
  return a.cover?`<div class="cvsm"><img src="${esc(a.cover)}" onerror="this.parentNode.innerHTML='🎵'" alt=""></div>`:`<div class="cvsm">🎵</div>`;
}
function cvLg(a){
  const s=sid(a.id);
  if(a.cover) return `<img class="cvlg" src="${esc(a.cover)}" onerror="this.outerHTML='<div class=cvlg-ph onclick=openCoverModal(&#39;${s}&#39;)>🎵</div>'" alt="">`;
  return `<div class="cvlg-ph" onclick="openCoverModal('${s}')">🎵</div>`;
}

function updateStats(){
  const r=albums.filter(a=>a.avg!=null);
  const avg=r.length?r.reduce((s,a)=>s+a.avg,0)/r.length:null;
  const best=r.length?r.reduce((b,a)=>a.avg>b.avg?a:b):null;
  const tracks=albums.reduce((s,a)=>s+a.tracks.filter(t=>t.grade!=null).length,0);
  const favs=albums.filter(a=>a.fav).length;
  document.getElementById('srow').innerHTML=
    `<div class="spill"><strong>${albums.length}</strong> albums</div>`+
    `<div class="spill"><strong>${r.length}</strong> notés</div>`+
    `<div class="spill">Moy. <strong class="${sc(avg)}">${avg?avg.toFixed(2):'—'}</strong></div>`+
    `<div class="spill"><strong>${tracks}</strong> morceaux</div>`+
    (favs?`<div class="spill">❤️ <strong>${favs}</strong></div>`:'')+
    (best?`<div class="spill">🏆 <strong>${esc(best.album)}</strong></div>`:'');
}

function toggleFilterChip(idx){
  const id=filterRegistry[idx]; if(!id) return;
  const i=activeFilters.indexOf(id);
  if(i>=0) activeFilters.splice(i,1); else activeFilters.push(id);
  buildFPanel(); render();
}
function clearFilters(){ activeFilters=[]; buildFPanel(); render(); }

function buildFPanel(){
  filterRegistry=[];
  const scoreF=[{id:'top',label:'≥ 8.5 ⭐'},{id:'good',label:'7.5 – 8.5'},{id:'low',label:'< 7.5'},{id:'unrated',label:'Non notés'},{id:'fav',label:'❤️ Coups de cœur'}];
  const nameCount={};
  albums.forEach(a=>a.artist.split(/[;&,\/]|feat\.?|ft\.?|\+| & /i).map(n=>n.trim()).filter(Boolean).forEach(n=>{nameCount[n]=(nameCount[n]||0)+1;}));
  const artistMap={};
  albums.forEach(a=>{
    const lo=a.artist.toLowerCase();
    Object.keys(nameCount).forEach(n=>{if(lo.includes(n.toLowerCase())){if(!artistMap[n])artistMap[n]=new Set();artistMap[n].add(a.id);}});
  });
  const artists=Object.keys(artistMap).filter(n=>artistMap[n].size>=2).sort((a,b)=>artistMap[b].size-artistMap[a].size);
  document.getElementById('fc-score').innerHTML=scoreF.map(f=>{
    const idx=filterRegistry.length; filterRegistry.push(f.id);
    return `<button class="fchip ${activeFilters.includes(f.id)?'on':''}" onclick="toggleFilterChip(${idx})">${esc(f.label)}</button>`;
  }).join('');
  document.getElementById('fc-artist').innerHTML=artists.map(n=>{
    const fid='artist:'+n, idx=filterRegistry.length; filterRegistry.push(fid);
    return `<button class="fchip ${activeFilters.includes(fid)?'on':''}" onclick="toggleFilterChip(${idx})">${esc(n)} <span style="opacity:.6">${artistMap[n].size}</span></button>`;
  }).join('');
  const hasF=activeFilters.length>0;
  document.getElementById('fbtn').classList.toggle('has-filter',hasF);
  const cb=document.getElementById('fclear-btn'); if(cb) cb.style.display=hasF?'block':'none';
}

function matchesFilters(a){
  if(!activeFilters.length) return true;
  const sF=activeFilters.filter(f=>!f.startsWith('artist:'));
  const aF=activeFilters.filter(f=>f.startsWith('artist:'));
  let sOk=!sF.length;
  for(const f of sF){
    if(f==='top'&&a.avg!=null&&a.avg>=8.5){sOk=true;break;}
    if(f==='good'&&a.avg!=null&&a.avg>=7.5&&a.avg<8.5){sOk=true;break;}
    if(f==='low'&&a.avg!=null&&a.avg<7.5){sOk=true;break;}
    if(f==='unrated'&&a.avg==null){sOk=true;break;}
    if(f==='fav'&&a.fav){sOk=true;break;}
  }
  let artOk=!aF.length;
  for(const f of aF){if(a.artist.toLowerCase().includes(f.slice(7).toLowerCase())){artOk=true;break;}}
  return sOk&&artOk;
}

      <div class="tmeta-title">${esc(a.album)}</div><div class="tmeta-artist">${esc(a.artist)}</div>

      <div class="score-box"><div class="score-box-label">🎧 Note Critique Pro</div><div class="score-box-val ${sc(a.avg)}">${ss(a.avg)}</div><div class="score-box-sub">note de l’auteur</div></div>

        <button class="btn" style="font-size:11px;padding:5px 10px" onclick="openCoverModal('${s}')">🖼 Cover</button>
        <button class="btn" style="font-size:11px;padding:5px 10px" onclick="openEdit('${s}')">✏️ Modifier</button>
        <button class="btn" style="font-size:11px;padding:5px 10px;color:var(--red);border-color:var(--red)" onclick="delAlbum('${s}')">Supprimer</button>

function render(){
  updateStats();
  const q=document.getElementById('search').value.toLowerCase().trim();
  const sort=document.getElementById('sort').value;
  let list=albums.filter(a=>(!q||a.artist.toLowerCase().includes(q)||a.album.toLowerCase().includes(q))&&matchesFilters(a));
  list.sort((a,b)=>{
    if(sort==='score-desc') return (b.avg||0)-(a.avg||0);
    if(sort==='score-asc'){if(!a.avg&&!b.avg)return 0;if(!a.avg)return 1;if(!b.avg)return -1;return a.avg-b.avg;}
    if(sort==='year-desc') return (b.year||0)-(a.year||0);
    if(sort==='year-asc'){if(!a.year&&!b.year)return 0;if(!a.year)return 1;if(!b.year)return -1;return a.year-b.year;}
    if(sort==='az') return a.album.localeCompare(b.album);
    if(sort==='za') return b.album.localeCompare(a.album);
    if(sort==='added') return (b.addedAt||0)-(a.addedAt||0);
    return 0;
  });
  const ct=document.getElementById('lview');
  ct.className=view==='grid'?'album-grid':'album-list';
  if(!list.length){ct.innerHTML='<div class="empty">Aucun résultat</div>';return;}

  if(view==='grid'){
    ct.innerHTML=list.map(a=>{
      const s=sid(a.id),xp=expandedId===a.id,vr=visitorRatings[a.id]||0;
      const cover=a.cover?`<div class="gcov-wrap"><img src="${esc(a.cover)}" onerror="this.style.display='none'" alt=""><button class="gcov-hbtn" onclick="event.stopPropagation();toggleFav('${s}')">${a.fav?'❤️':'🤍'}</button></div>`:`<div class="gcov-wrap">🎵<button class="gcov-hbtn" onclick="event.stopPropagation();toggleFav('${s}')">${a.fav?'❤️':'🤍'}</button></div>`;
      return `<div class="card-wrap ${xp?'xp-wrap':''}"><div class="gcard" style="${xp?'border-radius:var(--r) var(--r) 0 0;border-color:var(--accent);border-bottom-color:transparent':''}" onclick="toggleExpand('${s}')">
        ${cover}<div class="gbody">
          <div class="gscore ${sc(a.avg)}">${ss(a.avg)}<span style="font-size:11px;font-weight:400;color:var(--text3)">/10</span></div>
          <div class="sbar" style="margin-top:3px"><div class="sbar-f ${bc(a.avg)}" style="width:${sp(a.avg)}%"></div></div>
          <div class="gtitle">${esc(a.album)}</div><div class="gartist">${esc(a.artist)}</div>
          ${a.year?`<div style="font-size:10px;color:var(--text3);margin-top:1px">${a.year}</div>`:''}
          ${vr?`<div style="font-size:11px;color:#E99F27;margin-top:2px">${'★'.repeat(vr)}${'☆'.repeat(5-vr)}</div>`:''}
        </div>
      </div>${xp?buildPanel(a,s):''}</div>`;
    }).join('');
    return;
  }

  ct.innerHTML=list.map((a,i)=>{
    const s=sid(a.id),xp=expandedId===a.id,vr=visitorRatings[a.id]||0;
    return `<div class="card-wrap"><div class="acard ${xp?'xp':''}" onclick="toggleExpand('${s}')">
      <span class="arank">${i+1}</span>${cvSm(a)}
      <div class="ainfo">
        <div class="atitle">${esc(a.album)}</div><div class="aartist">${esc(a.artist)}</div>
        ${a.year?`<div class="ayear">${a.year}</div>`:''}
        ${a.fav?'<div class="afav-badge">❤ Coup de c\u0153ur de l\u2019auteur</div>':''}
      </div>
      <div class="ascw">
        <div class="ascore ${sc(a.avg)}">${ss(a.avg)}</div>
        <div class="sbar"><div class="sbar-f ${bc(a.avg)}" style="width:${sp(a.avg)}%"></div></div>
        ${vr?`<div style="font-size:10px;color:#E99F27;text-align:right;margin-top:2px">${'★'.repeat(vr)}</div>`:''}
      </div>
      <span class="xicon">▼</span>
      <button class="hbtn" onclick="event.stopPropagation();toggleFav('${s}')">${a.fav?'❤️':'🤍'}</button>
    </div>${xp?buildPanel(a,s):''}</div>`;
  }).join('');
}

    </div></div>`;}).join('')}</div></div>`;

function renderStats(){
  const rated=albums.filter(a=>a.avg!=null);
  if(!rated.length){document.getElementById('stats-content').innerHTML='<div class="empty">Note des albums pour voir les stats !</div>';return;}
  const avg=rated.reduce((s,a)=>s+a.avg,0)/rated.length;
  const best=rated.reduce((b,a)=>a.avg>b.avg?a:b);
  const worst=rated.reduce((b,a)=>a.avg<b.avg?a:b);
  const allTracks=albums.flatMap(a=>a.tracks.filter(t=>t.grade!=null));
  const bestTrack=allTracks.length?allTracks.reduce((b,t)=>t.grade>b.grade?t:b):null;
  const favs=albums.filter(a=>a.fav).length;
  const withCrit=albums.filter(a=>a.critique).length;
  const artistData={};
  rated.forEach(a=>a.artist.split(/[;&,\/]|feat\.?|ft\.?|\+| & /i).map(n=>n.trim()).filter(Boolean).forEach(n=>{if(!artistData[n])artistData[n]={total:0,count:0};artistData[n].total+=a.avg;artistData[n].count++;}));
  const topA=Object.entries(artistData).filter(([,v])=>v.count>=2).map(([n,v])=>({name:n,avg:v.total/v.count,count:v.count})).sort((a,b)=>b.avg-a.avg).slice(0,8);
  const buckets=Array(11).fill(0);
  rated.forEach(a=>buckets[Math.min(10,Math.floor(a.avg))]++);
  const maxB=Math.max(...buckets);
  document.getElementById('stats-content').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${albums.length}</div><div class="stat-lbl">Albums total</div></div>
      <div class="stat-card"><div class="stat-val">${rated.length}</div><div class="stat-lbl">Albums notés</div></div>
      <div class="stat-card"><div class="stat-val ${sc(avg)}">${avg.toFixed(2)}</div><div class="stat-lbl">Moyenne générale</div></div>
      <div class="stat-card"><div class="stat-val">${allTracks.length}</div><div class="stat-lbl">Morceaux notés</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#e03">❤️ ${favs}</div><div class="stat-lbl">Coups de cœur</div></div>
      <div class="stat-card"><div class="stat-val">✍️ ${withCrit}</div><div class="stat-lbl">Critiques écrites</div></div>
      <div class="stat-card"><div class="stat-val ${sc(best.avg)}">${best.avg.toFixed(2)}</div><div class="stat-lbl">Meilleur album</div><div class="stat-sub">${esc(best.album)}</div></div>
      <div class="stat-card"><div class="stat-val ${sc(worst.avg)}">${worst.avg.toFixed(2)}</div><div class="stat-lbl">Album le + faible</div><div class="stat-sub">${esc(worst.album)}</div></div>
      ${bestTrack?`<div class="stat-card"><div class="stat-val ${sc(bestTrack.grade)}">${bestTrack.grade}</div><div class="stat-lbl">Meilleur morceau</div><div class="stat-sub">${esc(bestTrack.title)}</div></div>`:''}
    </div>
    <div class="section-title">Distribution des notes</div>
    <div class="dist-wrap">${buckets.map((n,i)=>`<div class="dist-col"><div class="dist-bar ${i>=9?'be':i>=8?'bg2':i>=7?'bo':'bl'}" style="height:${maxB?Math.max(4,n/maxB*72):0}px"></div><div class="dist-lbl">${n||''}</div></div>`).join('')}</div>
    <div style="display:flex;gap:4px;margin-bottom:24px">${buckets.map((_,i)=>`<div style="flex:1;text-align:center;font-size:10px;color:var(--text3)">${i}</div>`).join('')}</div>
    ${topA.length?`<div class="section-title">Top artistes (≥ 2 albums notés)</div><div class="bar-chart">
      ${topA.map(a=>`<div class="bar-row"><div class="bar-label">${esc(a.name)}</div><div class="bar-track"><div class="bar-fill ${bc(a.avg)}" style="width:${sp(a.avg)}%"></div></div><div class="bar-val ${sc(a.avg)}">${a.avg.toFixed(2)}</div><div style="font-size:11px;color:var(--text3);min-width:40px">${a.count} alb.</div></div>`).join('')}</div>`:''} `;
}

  document.getElementById('f-cover').value=a.cover||'';
  const pv=document.getElementById('cvprev');
  pv.innerHTML=a.cover?`<img src="${esc(a.cover)}" onerror="this.outerHTML='🎵'" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`:'🎵';
  tCount=0;document.getElementById('ted').innerHTML='';
  (a.tracks||[]).forEach(t=>addTrack(t.title,t.grade,t.feat));
  addTrack();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function previewCover(){
  const url=document.getElementById('f-cover').value.trim();
  const pv=document.getElementById('cvprev');
  pv.innerHTML=url?`<img src="${esc(url)}" onerror="this.outerHTML='🎵'" style="width:100%;height:100%;object-fit:cover;border-radius:5px">`:'🎵';
}
function addTrack(title='',grade='',feat=''){
  const id=++tCount;
  const ed=document.getElementById('ted');
  const row=document.createElement('div');
  row.className='tir';row.id='ti-'+id;
  row.innerHTML=`<input type="text" placeholder="Titre" value="${esc(title)}" class="ti-title">`+
    `<input type="text" placeholder="Feat." value="${esc(feat||'')}" class="ti-feat">`+
    `<input type="number" placeholder="/10" min="0" max="10" step="0.05" value="${grade!=null&&grade!==''?grade:''}" class="ti-grade">`+
    `<button class="rmv" onclick="document.getElementById('ti-${id}').remove()">×</button>`;
  ed.appendChild(row);
}
function saveAlbum(){
  if(!isAdmin)return;
  const artist=document.getElementById('f-artist').value.trim();
  const album=document.getElementById('f-album').value.trim();
  const year=parseInt(document.getElementById('f-year').value)||null;
  const cover=document.getElementById('f-cover').value.trim()||null;
  if(!artist||!album){alert('Artiste et album requis.');return;}
  const tracks=[];
  document.querySelectorAll('#ted .tir').forEach(r=>{
    const title=r.querySelector('.ti-title').value.trim();
    const gv=r.querySelector('.ti-grade').value.trim();
    const fv=r.querySelector('.ti-feat').value.trim();
    if(title) tracks.push({title,grade:gv!==''?parseFloat(gv):null,feat:fv||null});
  });
  const grades=tracks.filter(t=>t.grade!=null).map(t=>t.grade);
  const avg=grades.length?Math.round(grades.reduce((s,g)=>s+g,0)/grades.length*1000)/1000:null;
  if(editingId){const idx=albums.findIndex(x=>sid(x.id)===editingId);if(idx>=0)albums[idx]={...albums[idx],artist,album,year,cover,tracks,avg};}
  else albums.push({id:'u'+Date.now(),artist,album,year,cover,tracks,avg,fav:false,critique:'',addedAt:Date.now()});
  save();closeModal();render();
}
function exportData(){
  const blob=new Blob([JSON.stringify(albums,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hiphop_notes_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importData(e){
  if(!isAdmin){alert('Connexion admin requise.');return;}
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw new Error('Format invalide');if(!confirm('Importer '+data.length+' albums ?'))return;albums=data;save();render();alert('✓ '+data.length+' albums importés !');}catch(err){alert('Erreur : '+err.message);}};
  reader.readAsText(file);e.target.value='';
}


// ── THEME
function initTheme(){
  const saved=safeStorage.getItem('hiphop_theme');
  const prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const theme=saved||(prefersDark?'dark':'light');
  document.body.classList.add(theme);
  updateThemeBtn();
}
function toggleTheme(){
  const isDark=document.body.classList.contains('dark');
  document.body.classList.remove('dark','light');
  document.body.classList.add(isDark?'light':'dark');
  safeStorage.setItem('hiphop_theme',isDark?'light':'dark');
  updateThemeBtn();
}
function updateThemeBtn(){
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=document.body.classList.contains('dark')?'☀️':'🌙';
}

// ── ADAPTIVE COLOR
function applyAdaptiveColor(panel,album){
  if(!album.cover) return;
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    try{
      const c=document.createElement('canvas');
      c.width=c.height=20;
      const ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,20,20);
      const d=ctx.getImageData(0,0,20,20).data;
      let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){
        const br=(d[i]+d[i+1]+d[i+2])/3;
        if(br>30&&br<220){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
      }
      if(n>0){r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);}
      const isDark=document.body.classList.contains('dark');
      panel.style.backgroundColor=`rgba(${r},${g},${b},${isDark?.14:.07})`;
      panel.style.borderColor=`rgba(${r},${g},${b},${isDark?.45:.25})`;
    }catch(e){}
  };
  img.src=album.cover;
}

// ── HALL OF FAME
function toggleHof(id){
  if(!isAdmin) return;
  const idx=albums.findIndex(a=>sid(a.id)===id);
  if(idx<0) return;
  albums[idx]={...albums[idx],hof:!albums[idx].hof};
  save();render();
  if(document.getElementById('tab-hof').classList.contains('on')) renderHof();
}

function renderHof(){
  const hofA=albums.filter(a=>a.hof).sort((a,b)=>(b.avg||0)-(a.avg||0));
  const ct=document.getElementById('hof-content');
  if(!hofA.length){
    ct.innerHTML=`<div class="hof-empty"><div class="hof-empty-icon">🏆</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">Le Hall of Fame est vide</div>
      <div style="font-size:13px">En mode admin, déplie un album et clique "Ajouter au Hall of Fame"</div></div>`;
    return;
  }
  const top3=hofA.slice(0,3), rest=hofA.slice(3);
  const medals=['🥇','🥈','🥉'], cls=['p1','p2','p3'];
  let html=`<div class="hof-hero">
    <div class="hof-title">🏆 Hall of <span>Fame</span></div>
    <div class="hof-subtitle">Les meilleurs albums selon le Critique</div>
    <div class="hof-count">${hofA.length} album${hofA.length>1?'s':''} sélectionné${hofA.length>1?'s':''}</div>
  </div>`;

  // PODIUM
  html+=`<div class="podium-wrap">`;
  top3.forEach((a,i)=>{
    const s=sid(a.id);
    const cov=a.cover?`<img class="podium-cover" src="${esc(a.cover)}" crossorigin="anonymous" onerror="this.style.background='rgba(255,255,255,.1)';this.src=''" alt="">`
      :`<div class="podium-cover" style="background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:32px">🎵</div>`;
    html+=`<div class="podium-item ${cls[i]}" onclick="switchTab('albums');setTimeout(()=>{expandedId='${s}';render();},80)">
      <div class="podium-rank">${medals[i]}</div>${cov}
      <div class="podium-score ${sc(a.avg)}">${ss(a.avg)}</div>
      <div class="podium-title">${esc(a.album)}</div>
      <div class="podium-artist">${esc(a.artist)}</div>
      <div class="podium-base">${i+1}</div>
    </div>`;
  });
  html+=`</div>`;

  // CRITIQUES TOP 3
  const top3withCrit=top3.filter(a=>a.critique);
  if(top3withCrit.length){
    html+=`<div class="hof-list">`;
    top3withCrit.forEach(a=>{
      html+=`<div class="hof-card"><div class="hof-card-top" style="cursor:default">
        ${a.cover?`<img class="hof-cover" src="${esc(a.cover)}" onerror="this.className='hof-cover-ph';this.innerHTML='🎵'" alt="">`:`<div class="hof-cover-ph">🎵</div>`}
        <div class="hof-info"><div class="hof-info-top">
          <div><div class="hof-album-title">${esc(a.album)}</div><div class="hof-album-artist">${esc(a.artist)}</div>${a.year?`<div style="font-size:12px;color:var(--text3)">${a.year}</div>`:''}</div>
          <div class="hof-score-big ${sc(a.avg)}">${ss(a.avg)}</div>
        </div></div>
      </div><div class="hof-critique"><span class="hof-critique-label">✍️ Critique</span>${esc(a.critique)}</div></div>`;
    });
    html+=`</div>`;
  }

  // REST
  if(rest.length){
    html+=`<div class="hof-list"><div class="hof-section-title">Suite du classement</div>`;
    rest.forEach((a,i)=>{
      const s=sid(a.id);
      html+=`<div class="hof-card">
        <div class="hof-card-top" onclick="switchTab('albums');setTimeout(()=>{expandedId='${s}';render();},80)">
          ${a.cover?`<img class="hof-cover" src="${esc(a.cover)}" onerror="this.outerHTML='<div class=hof-cover-ph>🎵</div>'" alt="">`:`<div class="hof-cover-ph">🎵</div>`}
          <div class="hof-info"><div class="hof-info-top">
            <div>
              <div class="hof-album-title">${esc(a.album)}</div>
              <div class="hof-album-artist">${esc(a.artist)}</div>
              ${a.year?`<div class="hof-album-artist">${a.year}</div>`:''}
              <div class="hof-badges"><span class="hof-rank-badge">#${i+4}</span>${a.fav?'<span class="hof-badge fav">❤ Coup de cœur</span>':''}</div>
            </div>
            <div class="hof-score-big ${sc(a.avg)}">${ss(a.avg)}</div>
          </div></div>
        </div>
        ${a.critique?`<div class="hof-critique"><span class="hof-critique-label">✍️ Critique</span>${esc(a.critique)}</div>`:`<div class="hof-no-critique">Aucune critique pour cet album</div>`}
      </div>`;
    });
    html+=`</div>`;
  }

  ct.innerHTML=html;
}


// Init after DOM ready
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',()=>{initTheme();renderAdminBar();render();});
} else {
  initTheme();renderAdminBar();render();
}
</script>
