<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rap World Map — The Dictionary of Rap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#0f0f0f;border-bottom:1px solid #1e1e1e;flex-shrink:0;z-index:500}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-size:14px;font-weight:800;color:#fff;letter-spacing:2px;text-transform:uppercase}
.topbar-back{font-size:12px;color:#555;text-decoration:none;letter-spacing:.5px;transition:color .15s}
.topbar-back:hover{color:#fff}
.counter{font-size:11px;color:#444;font-weight:600;letter-spacing:.5px}
.add-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;background:#fff;color:#0a0a0a;border:none;border-radius:6px;font-size:11px;font-weight:800;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:background .15s}
.add-btn:hover{background:#ddd}
.add-btn svg{width:13px;height:13px;flex-shrink:0}

/* MAP */
#map{flex:1;width:100%}

/* LEGEND */
#legend{position:absolute;bottom:24px;left:20px;z-index:1000;background:rgba(10,10,10,.92);border:1px solid #1e1e1e;border-radius:10px;padding:12px 16px;max-height:280px;overflow-y:auto}
.legend-title{font-size:9px;font-weight:800;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:11px;color:#888;margin-bottom:6px;cursor:pointer;transition:color .12s}
.legend-item:hover{color:#fff}
.legend-item.active{color:#fff}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* FORM PANEL */
#form-panel{position:absolute;top:64px;right:20px;z-index:1000;background:#111;border:1px solid #222;border-radius:12px;padding:20px;width:300px;display:none}
#form-panel h3{font-size:10px;font-weight:800;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:9px;font-weight:800;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.fg input,.fg select{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:9px 11px;font-size:13px;color:#fff;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus{border-color:#fff}
.fg select option{background:#1a1a1a}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-actions{display:flex;gap:8px;margin-top:16px}
.btn-cancel{flex:1;padding:9px;background:transparent;border:1px solid #222;border-radius:6px;color:#555;font-size:12px;cursor:pointer;transition:all .12s}
.btn-cancel:hover{border-color:#444;color:#aaa}
.btn-ok{flex:1;padding:9px;background:#fff;border:none;border-radius:6px;color:#0a0a0a;font-size:12px;font-weight:800;cursor:pointer;transition:background .12s}
.btn-ok:hover{background:#ddd}
.err{border-color:#ff4444!important}
.hint{font-size:10px;color:#444;margin-top:6px;line-height:1.5}

/* POPUPS */
.leaflet-popup-content-wrapper{background:#111!important;border:1px solid #2a2a2a!important;border-radius:10px!important;box-shadow:0 12px 40px rgba(0,0,0,.8)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;padding:0!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:#444!important;top:10px!important;right:12px!important;font-size:18px!important;width:20px!important;height:20px!important}
.leaflet-popup-close-button:hover{color:#fff!important;background:none!important}
.rap-popup{padding:16px 18px;min-width:200px}
.rap-popup-name{font-size:16px;font-weight:800;color:#fff;margin-bottom:3px;padding-right:20px}
.rap-popup-city{font-size:12px;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.rap-popup-style{display:inline-block;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}
.rap-popup-link{display:flex;align-items:center;gap:6px;font-size:11px;color:#444;text-decoration:none;border-top:1px solid #1e1e1e;padding-top:10px;transition:color .12s;letter-spacing:.3px}
.rap-popup-link:hover{color:#fff}

/* LEAFLET OVERRIDES */
.leaflet-control-zoom{border:1px solid #222!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:#111!important;color:#aaa!important;border-bottom:1px solid #1e1e1e!important;transition:all .12s!important}
.leaflet-control-zoom a:hover{background:#1e1e1e!important;color:#fff!important}
.leaflet-bar{border:none!important}
.leaflet-attribution-flag{display:none!important}
.leaflet-control-attribution{background:rgba(0,0,0,.5)!important;color:#333!important;font-size:9px!important}
.leaflet-control-attribution a{color:#444!important}

/* TOAST */
.toast{position:absolute;bottom:24px;right:20px;z-index:2000;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:10px 16px;font-size:12px;color:#fff;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* FILTER BAR */
#filter-bar{position:absolute;top:64px;left:20px;z-index:999;display:flex;gap:6px;flex-wrap:wrap;max-width:500px}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid #222;background:rgba(10,10,10,.8);color:#555;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .12s;text-transform:uppercase}
.filter-chip:hover{border-color:#444;color:#aaa}
.filter-chip.on{color:#0a0a0a;border-color:transparent}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="index.html">← The Dictionary of Rap</a>
      <span class="topbar-title">Rap World Map</span>
      <span class="counter" id="counter"></span>
    </div>
    <button class="add-btn" id="add-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter un rappeur
    </button>
  </div>
  <div id="map"></div>
</div>

<div id="filter-bar"></div>
<div id="legend"><div class="legend-title">Styles</div><div id="legend-items"></div></div>

<div id="form-panel">
  <h3>Nouveau rappeur</h3>
  <div class="fg"><label>Nom / Artiste</label><input id="f-name" type="text" placeholder="Ex: Nas"></div>
  <div class="fg"><label>Ville</label><input id="f-city" type="text" placeholder="Ex: Queensbridge, NY"></div>
  <div class="fg fg-row">
    <div><label>Latitude</label><input id="f-lat" type="number" step="0.0001" placeholder="40.7484"></div>
    <div><label>Longitude</label><input id="f-lng" type="number" step="0.0001" placeholder="-73.9474"></div>
  </div>
  <div class="fg">
    <label>Style</label>
    <select id="f-style">
      <option>Trap</option><option>Boom Bap</option><option>West Coast</option>
      <option>Drill</option><option>Cloud Rap</option><option>Conscient</option>
      <option>Gangsta Rap</option><option>Rap FR</option><option>UK Drill</option>
      <option>Grime</option><option>Autre</option>
    </select>
  </div>
  <p class="hint">Astuce : cherche les coordonnées sur Google Maps (clic droit → "Ces coordonnées")</p>
  <div class="form-actions">
    <button class="btn-cancel" id="cancel-btn">Annuler</button>
    <button class="btn-ok" id="ok-btn">Placer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STYLES = {
  'Trap':'#ff3b3b','Boom Bap':'#3b8fff','West Coast':'#ffaa00',
  'Drill':'#cc44ff','Cloud Rap':'#00d4ff','Conscient':'#00ff88',
  'Gangsta Rap':'#ff6600','Rap FR':'#ff3fa0','UK Drill':'#aa44ff',
  'Grime':'#00ffcc','Autre':'#888'
};

const INITIAL = [];

const safeLS = (() => {
  try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return localStorage; }
  catch(e) { const m={}; return {getItem:k=>m[k]??null,setItem:(k,v)=>{m[k]=v;},removeItem:k=>{delete m[k];}}; }
})();

function loadCustom(){ try{return JSON.parse(safeLS.getItem('rap_map_v2')||'[]');}catch(e){return [];} }
function saveCustom(arr){ safeLS.setItem('rap_map_v2',JSON.stringify(arr)); }

let activeFilter = null;
let allRappers = [...INITIAL, ...loadCustom()];
const markerObjs = [];

const map = L.map('map',{zoomControl:false}).setView([25,10],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);

function makeIcon(style, dim=false){
  const c = STYLES[style]||'#888';
  const op = dim ? '.2' : '1';
  return L.divIcon({
    className:'',
    html:`<div style="width:11px;height:11px;background:${c};border-radius:50%;border:2px solid rgba(255,255,255,.15);box-shadow:0 0 10px ${c}66;opacity:${op};transition:opacity .2s"></div>`,
    iconSize:[11,11],iconAnchor:[5,5],popupAnchor:[0,-8]
  });
}

function popupHTML(r){
  const c = STYLES[r.style]||'#888';
  return `<div class="rap-popup">
    <div class="rap-popup-name">${r.name}</div>
    <div class="rap-popup-city"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${r.city}</div>
    <span class="rap-popup-style" style="background:${c}1a;color:${c};border:1px solid ${c}33">${r.style}</span>
    <a class="rap-popup-link" href="index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Voir dans The Dictionary of Rap
    </a>
  </div>`;
}

function renderMarkers(){
  markerObjs.forEach(m=>map.removeLayer(m));
  markerObjs.length=0;
  allRappers.forEach(r=>{
    const dim = activeFilter && r.style !== activeFilter;
    const m = L.marker([r.lat,r.lng],{icon:makeIcon(r.style,dim)})
      .bindPopup(popupHTML(r),{maxWidth:260,className:''})
      .addTo(map);
    markerObjs.push(m);
  });
  document.getElementById('counter').textContent = allRappers.length+' rappeur'+(allRappers.length>1?'s':'');
}

function buildLegend(){
  const used = [...new Set(allRappers.map(r=>r.style))].sort();
  document.getElementById('legend-items').innerHTML = used.map(s=>{
    const c=STYLES[s]||'#888';
    const on = activeFilter===s;
    return `<div class="legend-item${on?' active':''}" onclick="toggleFilter('${s}')" style="${on?'color:#fff':''}">
      <div class="legend-dot" style="background:${c};box-shadow:0 0 5px ${c}55"></div>${s}
    </div>`;
  }).join('');
  document.getElementById('filter-bar').innerHTML = used.map(s=>{
    const c=STYLES[s]||'#888';
    const on=activeFilter===s;
    return `<div class="filter-chip${on?' on':''}" onclick="toggleFilter('${s}')" style="${on?`background:${c};color:#000`:''}">${s}</div>`;
  }).join('');
}

function toggleFilter(style){
  activeFilter = activeFilter===style ? null : style;
  renderMarkers();
  buildLegend();
}

renderMarkers();
buildLegend();

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('add-btn').onclick=()=>{
  const p=document.getElementById('form-panel');
  p.style.display=p.style.display==='block'?'none':'block';
};
document.getElementById('cancel-btn').onclick=()=>{
  document.getElementById('form-panel').style.display='none';
};
document.getElementById('ok-btn').onclick=()=>{
  const name=document.getElementById('f-name').value.trim();
  const city=document.getElementById('f-city').value.trim();
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);
  const style=document.getElementById('f-style').value;
  ['f-name','f-city','f-lat','f-lng'].forEach(id=>document.getElementById(id).classList.remove('err'));
  let ok=true;
  if(!name){document.getElementById('f-name').classList.add('err');ok=false;}
  if(!city){document.getElementById('f-city').classList.add('err');ok=false;}
  if(isNaN(lat)){document.getElementById('f-lat').classList.add('err');ok=false;}
  if(isNaN(lng)){document.getElementById('f-lng').classList.add('err');ok=false;}
  if(!ok) return;
  const r={name,city,lat,lng,style};
  const custom=loadCustom();
  custom.push(r);
  saveCustom(custom);
  allRappers.push(r);
  renderMarkers();
  buildLegend();
  map.flyTo([lat,lng],8,{duration:1.4});
  setTimeout(()=>{
    const m=markerObjs[markerObjs.length-1];
    if(m) m.openPopup();
  },1600);
  ['f-name','f-city','f-lat','f-lng'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('form-panel').style.display='none';
  showToast(name+' ajouté sur la carte');
};
</script>
</body>
</html>
